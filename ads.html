<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1A3A8F">
  <title>Advertise on PaMarket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#F3F4F6;color:#111827;min-height:100vh;-webkit-font-smoothing:antialiased}
    button{cursor:pointer;font-family:inherit;border:none;background:none}
    input,select,textarea{font-family:inherit}

    .topbar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;gap:12px;padding:14px 16px;padding-top:calc(14px + env(safe-area-inset-top))}
    .topbar-back{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:#1A3A8F;padding:6px 10px 6px 0}
    .topbar-title{font-size:17px;font-weight:800;color:#111827;flex:1;text-align:center}

    .hero{background:linear-gradient(135deg,#1A3A8F 0%,#2952cc 100%);padding:28px 20px 24px;text-align:center}
    .hero-logo{font-size:22px;font-weight:900;color:#fff;margin-bottom:6px}
    .hero-logo em{color:#F5A623;font-style:normal}
    .hero-title{font-size:24px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:8px}
    .hero-sub{font-size:13px;color:rgba(255,255,255,.75);line-height:1.5}

    .section{padding:0 16px;margin-bottom:18px}
    .section-label{font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;margin-top:4px}
    .card{background:#fff;border-radius:16px;border:1px solid #E5E7EB;overflow:hidden}

    /* Plan cards */
    .plan{background:#fff;border:2px solid #E5E7EB;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
    .plan.sel{border-color:#1A3A8F;background:#EFF6FF}
    .plan-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
    .plan-name{font-size:15px;font-weight:800;color:#111827}
    .plan.sel .plan-name{color:#1A3A8F}
    .plan-price{font-size:16px;font-weight:900;color:#1A3A8F}
    .plan-desc{font-size:12px;color:#6B7280;line-height:1.4}
    .plan-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;background:#FFF7ED;color:#D97706;border:1px solid #FDE68A}

    /* Method tabs */
    .method-tabs{display:flex;gap:8px;margin-bottom:12px}
    .method-tab{flex:1;padding:10px 4px;border-radius:12px;border:2px solid #E5E7EB;background:#fff;font-size:13px;font-weight:700;color:#6B7280;transition:all .15s;text-align:center}
    .method-tab.active{border-color:var(--mc);background:var(--mb);color:var(--mc)}

    .detail-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.06)}
    .detail-row:last-child{border-bottom:none}
    .detail-label{font-size:12px;color:#6B7280;font-weight:500}
    .detail-val{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#111827}

    .fg{margin-bottom:14px}
    .fl{font-size:13px;font-weight:600;color:#374151;margin-bottom:6px}
    .fi{width:100%;border:1.5px solid #E5E7EB;border-radius:10px;padding:12px 14px;font-size:14px;color:#111827;background:#fff;outline:none;transition:border-color .15s}
    .fi:focus{border-color:#1A3A8F}

    .amount-presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
    .preset-btn{flex:1;min-width:48px;padding:10px 0;border-radius:10px;border:2px solid #E5E7EB;background:#fff;font-size:14px;font-weight:700;color:#111827;transition:all .15s}
    .preset-btn.active{border-color:#1A3A8F;background:#EFF6FF;color:#1A3A8F}

    .btn-primary{width:100%;padding:15px;background:#1A3A8F;color:#fff;border-radius:12px;font-size:15px;font-weight:800;transition:opacity .15s}
    .btn-primary:disabled{opacity:.5}

    .notice{border-radius:12px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;font-size:12px;line-height:1.6}
    .notice.amber{background:#FFFBEB;border:1.5px solid #FDE68A;color:#92400E}
    .notice.green{background:#F0FDF4;border:1.5px solid #86EFAC;color:#15803d;display:block;text-align:center}

    .step{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
    .step-num{width:22px;height:22px;border-radius:50%;background:#1A3A8F;color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
    .step-text{font-size:13px;color:#6B7280;line-height:1.5}

    .tx-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid #F3F4F6}
    .tx-row:last-child{border-bottom:none}
    .err{background:#FEF2F2;border:1.5px solid #FECACA;border-radius:10px;color:#EF4444;font-size:13px;font-weight:600;padding:10px 12px;margin-bottom:12px;display:none}

    /* Auth */
    .auth-wrap{max-width:420px;margin:0 auto;padding:32px 20px}
    .auth-sep{display:flex;align-items:center;gap:10px;margin:16px 0;color:#9CA3AF;font-size:12px}
    .auth-sep::before,.auth-sep::after{content:'';flex:1;height:1px;background:#E5E7EB}

    @media(prefers-color-scheme:dark){
      body{background:#0F172A;color:#F1F5F9}
      .topbar,.card,.plan{background:#1E293B;border-color:#334155}
      .plan.sel{background:#1e3a5f}
      .topbar-title,.plan-name{color:#F1F5F9}
      .fi{background:#0F172A;border-color:#334155;color:#F1F5F9}
      .preset-btn{background:#1E293B;border-color:#334155;color:#F1F5F9}
    }
  </style>
</head>
<body>
<div id="root"><div style="text-align:center;padding:60px 20px;color:#9CA3AF;font-size:14px">Loading…</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';
const SUPABASE_URL     = 'https://gxgytumhknmnwspxjzxw.supabase.co';
const SUPABASE_ANON_KEY= 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd4Z3l0dW1oa25tbndzcHhqenh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzMwNDUsImV4cCI6MjA5MzY0OTA0NX0.ddJhWdUy7JVrSfdaSK8a0On3zuwssY2H4DWsxBhgbJs';
const APP_URL          = 'https://princechakusa.github.io/PaMarket/';

const sb  = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const qs  = new URLSearchParams(location.search);
const boostListing = qs.get('listing');
const boostPlan    = qs.get('plan');
const boostPrice   = qs.get('price');

const PLANS = [
  { id:'standard', name:'Standard Boost', price:2,  days:3,  desc:'3 days at the top of results' },
  { id:'featured', name:'Featured',        price:5,  days:7,  desc:'7 days · Featured badge on listing' },
  { id:'premium',  name:'Premium',         price:10, days:14, desc:'14 days · Top placement + highlighted', badge:'Best Value' },
];

const METHODS = {
  ecocash:  { id:'ecocash',  label:'EcoCash',      network:'Econet Wireless', color:'#00A651', bg:'#F0FDF4', border:'#86EFAC', textColor:'#15803d', number:'+263 77 734 1565', rawNumber:'+263777341565', name:'Prince Chakusa' },
  onemoney: { id:'onemoney', label:'OneMoney',      network:'NetOne',          color:'#E65C00', bg:'#FFF7F0', border:'#FDBA74', textColor:'#9a3412', number:'+263 77 734 1565', rawNumber:'+263777341565', name:'Prince Chakusa' },
  bank:     { id:'bank',     label:'Bank Transfer', network:'CBZ Bank',        color:'#1A3A8F', bg:'#EFF6FF', border:'#BFDBFE', textColor:'#1e40af', account:'05121050340078', name:'Prince Chakusa', bankName:'CBZ Bank Zimbabwe', branch:'Harare Main' },
};

let user     = null;
let selPlan  = boostPlan || 'standard';
let selMethod= 'ecocash';
let history_  = [];

const IC = {
  back: `<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>`,
  copy: `<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
  info: `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  google:`<svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>`,
};

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(d){ return new Date(d).toLocaleDateString('en-ZW',{day:'numeric',month:'short',year:'numeric'}); }
function copy(t,l){ navigator.clipboard&&navigator.clipboard.writeText(t.replace(/\s/g,'')).then(()=>toast(l+' copied!')); }
function toast(m){ const e=document.getElementById('_toast'); if(!e)return; e.textContent=m; e.style.opacity='1'; setTimeout(()=>e.style.opacity='0',2400); }

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function init() {
  const { data:{ session } } = await sb.auth.getSession();
  if (session?.user) { user = session.user; await load(); renderMain(); }
  else renderAuth();
  sb.auth.onAuthStateChange(async (_, s) => {
    if (s?.user) { user = s.user; await load(); renderMain(); }
    else { user = null; renderAuth(); }
  });
}

async function load() {
  try {
    const { data:p } = await sb.from('profiles').select('name').eq('id', user.id).single();
    if (p) user._name = p.name || user.email;
    const { data:h } = await sb.from('topup_requests').select('*').eq('user_id', user.id).order('created_at',{ascending:false}).limit(20);
    history_ = h || [];
  } catch(e){ console.warn(e); }
}

async function signInGoogle() { await sb.auth.signInWithOAuth({ provider:'google', options:{ redirectTo: location.href } }); }
async function signInEmail(e) {
  e.preventDefault();
  const email=document.getElementById('aEmail').value.trim(), pass=document.getElementById('aPass').value;
  const err=document.getElementById('aErr'), btn=document.getElementById('aBtn');
  err.style.display='none';
  if(!email||!pass){err.textContent='Enter email and password';err.style.display='block';return;}
  btn.disabled=true; btn.textContent='Signing in…';
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent=error.message;err.style.display='block';btn.disabled=false;btn.textContent='Sign In';}
}
async function signOut(){ await sb.auth.signOut(); }

// ─── Plan / method selection ──────────────────────────────────────────────────
function pickPlan(id) {
  selPlan = id;
  document.querySelectorAll('.plan').forEach(p => p.classList.toggle('sel', p.dataset.p === id));
  const pl = PLANS.find(p=>p.id===id);
  const amtEl = document.getElementById('tuAmt');
  if(amtEl && pl) { amtEl.value = pl.price; setPreset(pl.price); }
}
function pickMethod(m) {
  selMethod = m;
  document.querySelectorAll('.method-tab').forEach(t => {
    const a = t.dataset.m === m, cfg = METHODS[t.dataset.m];
    t.classList.toggle('active', a);
    t.style.setProperty('--mc', cfg.color);
    t.style.setProperty('--mb', cfg.bg);
  });
  document.querySelectorAll('.mdetail').forEach(d => d.style.display = d.dataset.m===m?'':'none');
}
function setPreset(v) {
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',+b.dataset.v===+v));
}
function pickAmt(v){ document.getElementById('tuAmt').value=v; setPreset(v); }
function clearPresets(){ document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active')); }

// ─── Submit ───────────────────────────────────────────────────────────────────
async function submit() {
  const amt = parseFloat(document.getElementById('tuAmt')?.value);
  const ref = (document.getElementById('tuRef')?.value||'').trim().toUpperCase();
  const err = document.getElementById('tuErr');
  const btn = document.getElementById('tuBtn');
  err.style.display='none';
  const showErr=m=>{err.textContent=m;err.style.display='block';};
  if(!amt||amt<1){showErr('Enter an amount of at least $1.00');return;}
  if(amt>5000){showErr('Maximum $5,000 per submission');return;}
  if(!ref){showErr('Enter the transaction reference from your SMS');return;}
  if(ref.length<6){showErr('Reference seems too short — check your SMS');return;}
  if(history_.some(r=>(r.reference||'').toUpperCase()===ref)){showErr('This reference was already submitted');return;}
  btn.disabled=true; btn.textContent='Submitting…';
  const cfg=METHODS[selMethod];
  const planLabel = (PLANS.find(p=>p.id===selPlan)||{}).name||selPlan;
  const note = boostListing ? `Ad boost: listing ${boostListing} · Plan: ${planLabel}` : `Ad package: ${planLabel}`;
  const {error}=await sb.from('topup_requests').insert({
    user_id: user.id, user_name: user._name||user.email,
    amount: amt, method: cfg.label, reference: ref,
    status: 'pending', note,
  });
  if(error&&error.code!=='23505'){
    btn.disabled=false; btn.textContent='I Have Paid — Submit';
    showErr('Submission failed: '+error.message); return;
  }
  document.getElementById('tuSuccess').style.display='';
  document.getElementById('tuForm').style.display='none';
}

function detailRow(label,val,raw){
  return `<div class="detail-row"><span class="detail-label">${label}</span>
    <span class="detail-val">${esc(val)}${raw?`<button style="background:none;border:none;color:#9CA3AF;cursor:pointer;padding:2px;line-height:1" onclick="copy('${esc(raw)}','${esc(label)}')">${IC.copy}</button>`:''}</span></div>`;
}

// ─── Render: Auth ─────────────────────────────────────────────────────────────
function renderAuth() {
  document.getElementById('root').innerHTML = `
    <div class="topbar">
      <button class="topbar-back" onclick="history.back()">${IC.back} App</button>
      <div class="topbar-title">Advertise</div>
      <div style="width:60px"></div>
    </div>
    <div class="hero">
      <div class="hero-logo">Pa<em>Market</em></div>
      <div class="hero-title">Advertise &amp; Promote<br>Your Listings</div>
      <div class="hero-sub">Sign in to boost your listing and reach more buyers across Zimbabwe</div>
    </div>
    <div class="auth-wrap">
      <button onclick="signInGoogle()" style="width:100%;padding:13px;background:#fff;border:1.5px solid #E5E7EB;border-radius:12px;font-size:14px;font-weight:700;color:#374151;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px">
        ${IC.google} Continue with Google
      </button>
      <div class="auth-sep">or use email</div>
      <div id="aErr" class="err"></div>
      <form onsubmit="signInEmail(event)">
        <div class="fg"><div class="fl">Email</div><input class="fi" id="aEmail" type="email" placeholder="you@example.com" autocomplete="email"></div>
        <div class="fg"><div class="fl">Password</div><input class="fi" id="aPass" type="password" placeholder="Password" autocomplete="current-password"></div>
        <button id="aBtn" type="submit" class="btn-primary">Sign In</button>
      </form>
      <p style="text-align:center;font-size:12px;color:#9CA3AF;margin-top:14px">
        Same account as the PaMarket app ·
        <a href="${APP_URL}" style="color:#1A3A8F;font-weight:600">← Open App</a>
      </p>
    </div>
    <div id="_toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap"></div>
  `;
}

// ─── Render: Main ─────────────────────────────────────────────────────────────
function renderMain() {
  const eco=METHODS.ecocash, one=METHODS.onemoney, bank=METHODS.bank;
  const initPlan = PLANS.find(p=>p.id===selPlan)||PLANS[0];

  const histRows = history_.map(r => {
    const pend = r.status==='pending';
    return `<div class="tx-row">
      <div style="width:40px;height:40px;border-radius:12px;background:${pend?'#FFFBEB':'#F0FDF4'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px">${pend?'⏳':'✅'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.note||r.method||'')}</div>
        <div style="font-size:11px;color:#9CA3AF;margin-top:2px">${fmt(r.created_at)} · Ref: ${esc(r.reference||'')}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:15px;font-weight:800;color:${pend?'#D97706':'#00A651'}">$${(+(r.amount||0)).toFixed(2)}</div>
        <div style="font-size:10px;font-weight:700;color:${pend?'#D97706':'#00A651'};margin-top:2px">${pend?'Verifying':'Approved'}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('root').innerHTML = `
    <div class="topbar">
      <button class="topbar-back" onclick="history.back()">${IC.back} App</button>
      <div class="topbar-title">Advertise</div>
      <button onclick="signOut()" style="font-size:12px;color:#6B7280;font-weight:600;padding:6px;width:60px;text-align:right">Sign out</button>
    </div>

    <div class="hero">
      <div class="hero-logo">Pa<em>Market</em></div>
      <div class="hero-title">Boost Your Listing</div>
      <div class="hero-sub">Appear at the top of search results and reach more buyers across Zimbabwe</div>
    </div>

    <div id="tuForm">
      ${boostListing ? `
      <div style="background:#FFF7ED;border:1.5px solid #FDE68A;border-radius:14px;padding:14px 16px;margin:16px;display:flex;gap:12px;align-items:flex-start">
        <div style="font-size:22px">⚡</div>
        <div>
          <div style="font-size:13px;font-weight:800;color:#D97706;margin-bottom:3px">Listing selected from app</div>
          <div style="font-size:12px;color:#92400E;line-height:1.4">Choose a plan below, pay, and admin will activate your boost within 24 hours.</div>
        </div>
      </div>` : ''}

      <!-- Advertising plans -->
      <div class="section">
        <div class="section-label">Choose Your Advertising Plan</div>
        ${PLANS.map(p=>`
          <div class="plan ${p.id===selPlan?'sel':''}" data-p="${p.id}" onclick="pickPlan('${p.id}')">
            <div class="plan-top">
              <div><span class="plan-name">${p.name}</span>${p.badge?`<span class="plan-badge">${p.badge}</span>`:''}</div>
              <div class="plan-price">$${p.price}</div>
            </div>
            <div class="plan-desc">${p.desc}</div>
          </div>`).join('')}
      </div>

      <!-- How it works -->
      <div class="section">
        <div class="section-label">How It Works</div>
        <div class="card" style="padding:14px 16px">
          <div class="step"><div class="step-num">1</div><div class="step-text">Choose your plan above</div></div>
          <div class="step"><div class="step-num">2</div><div class="step-text">Send payment via EcoCash, OneMoney or Bank Transfer to the details below</div></div>
          <div class="step"><div class="step-num">3</div><div class="step-text">Enter your payment reference and submit</div></div>
          <div class="step" style="margin-bottom:0"><div class="step-num">4</div><div class="step-text">Admin verifies within 24 hours and activates your listing boost</div></div>
        </div>
      </div>

      <!-- Payment method -->
      <div class="section">
        <div class="section-label">Send Payment Via</div>
        <div class="method-tabs">
          <button class="method-tab active" data-m="ecocash" onclick="pickMethod('ecocash')" style="--mc:${eco.color};--mb:${eco.bg}">EcoCash</button>
          <button class="method-tab" data-m="onemoney" onclick="pickMethod('onemoney')" style="--mc:${one.color};--mb:${one.bg}">OneMoney</button>
          <button class="method-tab" data-m="bank" onclick="pickMethod('bank')" style="--mc:${bank.color};--mb:${bank.bg}">Bank</button>
        </div>

        <div class="mdetail card" data-m="ecocash" style="padding:16px;background:${eco.bg};border-color:${eco.border};margin-bottom:4px">
          <div style="font-size:13px;font-weight:700;color:${eco.textColor};margin-bottom:10px">Send to:</div>
          <div style="font-size:28px;font-weight:900;color:${eco.color};letter-spacing:2px;margin-bottom:4px">${eco.number}</div>
          <div style="font-size:12px;color:${eco.textColor};margin-bottom:12px">Name: <strong>${eco.name}</strong></div>
          ${detailRow('Network','Econet Wireless (EcoCash)',null)}
          ${detailRow('Number',eco.number,eco.rawNumber)}
          ${detailRow('Name',eco.name,eco.name)}
          ${detailRow('Reference','Your full name','')}
        </div>
        <div class="mdetail card" data-m="onemoney" style="display:none;padding:16px;background:${one.bg};border-color:${one.border};margin-bottom:4px">
          <div style="font-size:13px;font-weight:700;color:${one.textColor};margin-bottom:10px">Send to:</div>
          <div style="font-size:28px;font-weight:900;color:${one.color};letter-spacing:2px;margin-bottom:4px">${one.number}</div>
          <div style="font-size:12px;color:${one.textColor};margin-bottom:12px">Name: <strong>${one.name}</strong></div>
          ${detailRow('Network','NetOne (OneMoney)',null)}
          ${detailRow('Number',one.number,one.rawNumber)}
          ${detailRow('Name',one.name,one.name)}
          ${detailRow('Reference','Your full name','')}
        </div>
        <div class="mdetail card" data-m="bank" style="display:none;padding:16px;background:${bank.bg};border-color:${bank.border};margin-bottom:4px">
          <div style="font-size:13px;font-weight:700;color:${bank.textColor};margin-bottom:10px">Bank Transfer Details:</div>
          ${detailRow('Bank',bank.bankName,null)}
          ${detailRow('Account Name',bank.name,bank.name)}
          ${detailRow('Account No.',bank.account,bank.account)}
          ${detailRow('Branch',bank.branch,null)}
          ${detailRow('Reference','Your full name','')}
        </div>
      </div>

      <!-- Amount & reference -->
      <div class="section">
        <div class="fg">
          <div class="fl">Amount (USD)</div>
          <div class="amount-presets">
            ${PLANS.map(p=>`<button class="preset-btn${p.id===selPlan?' active':''}" data-v="${p.price}" onclick="pickAmt(${p.price})">\$${p.price}</button>`).join('')}
          </div>
          <input class="fi" id="tuAmt" type="number" min="1" step="1" placeholder="Or custom amount" value="${initPlan.price}" oninput="clearPresets()">
        </div>
        <div class="fg">
          <div class="fl">Payment Reference</div>
          <input class="fi" id="tuRef" placeholder="e.g. ECO123456789" autocapitalize="characters" autocomplete="off">
          <div style="font-size:12px;color:#9CA3AF;margin-top:5px">The confirmation code from your EcoCash / OneMoney / bank SMS after payment</div>
        </div>

        <div class="notice amber" style="margin-bottom:14px">
          ${IC.info}
          <div><strong>Not processed by Google Play or App Store.</strong> Payment is made directly via Zimbabwe mobile money or bank transfer. This is an advertising service delivered by PaMarket.
          Need help? <a href="https://wa.me/971589772645" style="color:#D97706;font-weight:700">WhatsApp us</a></div>
        </div>

        <div id="tuErr" class="err"></div>
        <button id="tuBtn" class="btn-primary" onclick="submit()">I Have Paid — Submit for Verification</button>
        <div style="text-align:center;font-size:12px;color:#9CA3AF;margin-top:8px;margin-bottom:4px">Admin verifies within 24 hours · Boost activates automatically</div>
      </div>
    </div>

    <!-- Success -->
    <div id="tuSuccess" style="display:none" class="section">
      <div class="notice green" style="padding:24px;border-radius:16px">
        <div style="font-size:40px;margin-bottom:10px">🎉</div>
        <div style="font-size:16px;font-weight:800;color:#15803d;margin-bottom:6px">Ad Submitted!</div>
        <div style="font-size:13px;color:#166534;line-height:1.5;margin-bottom:16px">Your payment is being verified. Admin will activate your listing boost within 24 hours.</div>
        <a href="${APP_URL}" style="display:inline-block;padding:12px 24px;background:#15803d;color:#fff;border-radius:10px;font-size:14px;font-weight:700">← Return to App</a>
      </div>
    </div>

    <!-- History -->
    ${history_.length ? `
    <div class="section">
      <div class="section-label">Submission History</div>
      <div class="card" style="padding:0 16px">${histRows}</div>
    </div>` : ''}

    <div style="height:48px"></div>
    <div id="_toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:9999"></div>
  `;
}

init();
</script>
</body>
</html>
