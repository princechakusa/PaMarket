<!DOCTYPE html>

  <!-- Splash animation -->
  <style>
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .splash-logo    { animation: fadeInUp 0.8s ease-out both; }
    .splash-tagline { animation: fadeInUp 0.8s 0.3s ease-out both; }

    /* ===== ACTION SHEET STYLES (inline "“ guarantees the account menu works) ===== */
    .action-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: #fff;
      border-radius: 22px 22px 0 0;
      padding: 22px 16px calc(22px + env(safe-area-inset-bottom));
      z-index: 9100;
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 -10px 40px rgba(44,62,80,.14);
    }
    .action-sheet.open {
      transform: translateY(0) !important;
    }

    .sheet-bg {
      position: fixed;
      inset: 0;
      background: rgba(44,62,80,.4);
      z-index: 9050;
      display: none;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .sheet-bg.open {
      display: block;
    }

    .sheet-header {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 18px;
      text-align: center;
      color: #2C3E50;
      padding: 8px 0;
    }
    .sheet-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 14px;
      border-bottom: 1px solid rgba(44,62,80,.08);
      cursor: pointer;
      font-size: 15px;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      border-bottom: 1px solid rgba(44,62,80,.08);
      transition: background .15s;
    }
    .sheet-item:active { background: #F7F4EF; }
    .sheet-item:last-of-type { border-bottom: none; }
    .sheet-item.danger { color: #C0392B; }
    .sheet-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .sheet-label { flex: 1; font-weight: 500; color: #2C3E50; }
    .sheet-item.danger .sheet-label { color: #C0392B; font-weight: 700; }
    .sheet-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border: 1px solid rgba(44,62,80,.15);
      background: transparent;
      border-radius: 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: #4A5568;
      transition: all .2s;
    }
    .sheet-close:active { background: rgba(44,62,80,.04); }
  </style>
</head>
<body>

  <div id="hostlySplash" style="position:fixed;inset:0;background:#1A0E08;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity 0.3s ease-in-out;font-family:'Montserrat',sans-serif;">
    <img src="/img/icon-192.png" alt="Hostly" class="splash-logo" style="width:110px;height:110px;border-radius:24px;margin-bottom:24px;" />
    <div class="splash-tagline" style="font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.02em;">Zimbabwe's #1 Marketplace</div>
  </div>

      <div class="post-fab-wrap"><button class="post-fab active" data-nav="Post" title="Post an Ad"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button><span class="fab-lbl">Post Ad</span></div>
      <button class="nav-btn" data-nav="Messages"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>Messages</span></button>

    </div>
  </div>

  <!-- Splash removal + Service Worker -->
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('hostlySplash');
        if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 300); }
      }, 2000);

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(err => {
          console.warn('Service Worker registration failed:', err.message);
        });
      }
    });
  </script>
<script>
window.addEventListener("load", () => {
  H.authAdminSignInPage = async function () {
    const email = document.getElementById("admEmailPage")?.value.trim();
    const pass  = document.getElementById("admPassPage")?.value.trim();
    if (!email || !pass) { H.toast("Enter admin credentials"); return; }
    const u = (H.state.users || []).find(x =>
      (x.email || "").toLowerCase() === email.toLowerCase() &&
      x._localPassword === pass &&
      x.role === "admin"
    );
    if (u) {
      H.state.currentUserId = u.id;
      H.state.adminSession = { at: Date.now(), via: "local" };
      H.saveState();
      H.boot();
    } else {
      H.toast("Invalid admin credentials");
    }
  };
});
</script>
