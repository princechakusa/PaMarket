    /* ── Splash Screen ─────────────────────────────────── */
    #pamarketSplash {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #1A3A8F 0%, #0f2460 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99999;
      transition: opacity .4s ease, transform .4s ease;
      font-family: 'Inter', sans-serif;
    }
    #pamarketSplash.hiding {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }
    .splash-wordmark {
      font-size: 52px; font-weight: 900;
      color: #fff; letter-spacing: -2px; line-height: 1;
      animation: splashBounce .65s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .splash-wordmark em { font-style: normal; color: #F5A623; }

    .splash-divider {
      width: 36px; height: 2px; border-radius: 2px;
      background: rgba(255,255,255,.22);
      margin: 14px 0 14px;
      animation: splashFade .5s .3s both;
    }

    /* Lines 2 + 3 — word-column layout */
    .splash-slogan-row {
      display: flex; align-items: flex-start; gap: 14px;
      animation: splashFade .5s .35s both;
    }
    .splash-word-col {
      display: flex; flex-direction: column; align-items: center;
    }
    .splash-slogan-word {
      font-size: 19px; font-weight: 700;
      color: #fff; letter-spacing: .3px; line-height: 1.2;
      white-space: nowrap;
    }
    /* Line 3 — the 12:00 PM shadow */
    .splash-shadow-word {
      font-size: 19px; font-weight: 700;
      color: #8faae8; letter-spacing: .3px; line-height: 1;
      white-space: nowrap;
      margin-top: 4px;
      filter: blur(2px);
      opacity: .58;
      pointer-events: none;
    }

    .splash-dots {
      display: flex; gap: 6px; margin-top: 44px;
      animation: splashFade .5s .55s both;
    }
    .splash-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,.3);
      animation: dotPulse 1.2s infinite;
    }
    .splash-dots span:nth-child(2) { animation-delay: .2s; }
    .splash-dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes splashBounce {
      from { transform:translateY(16px) scale(.94); }
      to   { transform:none; }
    }
    @keyframes splashFade {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:none; }
    }
    @keyframes dotPulse {
      0%,80%,100% { background:rgba(255,255,255,.25); transform:scale(.8); }
      40%         { background:#F5A623; transform:scale(1); }
    }

    /* ── Action Sheet ──────────────────────────────────── */
    .action-sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: var(--card, #fff);
      border-radius: 22px 22px 0 0;
      padding: 22px 16px calc(24px + env(safe-area-inset-bottom));
      z-index: 9100;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 -8px 40px rgba(16,24,40,.14);
      border-top: 1px solid var(--border, #E4E8F0);
      font-family: 'Inter', sans-serif;
      max-height: 90vh;
      overflow-y: auto;
    }
    .action-sheet.open { transform: translateY(0); }

    .sheet-bg {
      position: fixed; inset: 0;
      background: rgba(16,24,40,.45);
      z-index: 9050;
      display: none;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .sheet-bg.open { display: block; }

    .sheet-header {
      font-size: 17px; font-weight: 800;
      margin-bottom: 18px; text-align: center;
      color: var(--text, #101828);
      padding: 4px 0 12px;
      border-bottom: 1px solid var(--border, #E4E8F0);
      letter-spacing: -.3px;
    }
    .sheet-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 12px;
      border-bottom: 1px solid var(--border, #E4E8F0);
      cursor: pointer; font-size: 15px;
      width: 100%; text-align: left;
      background: none; border-top: none;
      border-left: none; border-right: none;
      transition: background .15s;
      font-family: 'Inter', sans-serif;
      color: var(--text, #101828);
    }
    .sheet-item:active { background: rgba(26,58,143,.06); }
    .sheet-item:last-of-type { border-bottom: none; }
    .sheet-item.danger { color: #B42318; }
    .sheet-icon {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: #1A3A8F;
    }
    .sheet-item.danger .sheet-icon { color: #B42318; }
    .sheet-label { flex: 1; font-weight: 500; }
    .sheet-item.danger .sheet-label { color: #B42318; font-weight: 700; }
    .sheet-close {
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      width: 100%; padding: 14px; margin-top: 10px;
      border: 1.5px solid var(--border, #E4E8F0);
      background: transparent; border-radius: 14px;
      cursor: pointer; font-size: 15px; font-weight: 600;
      color: var(--sub, #667085);
      transition: all .2s; font-family: 'Inter', sans-serif;
    }
    .sheet-close:active { background: var(--bg, #F5F6FA); }

  <!-- ── App Bootstrap ────────────────────────────────── -->
  <script>
    // ── Splash hide — tied to app readiness, not a hard timer ──
    window._hideSplash = function() {
      const splash = document.getElementById('pamarketSplash');
      if (!splash) return;
      splash.classList.add('hiding');
      document.documentElement.style.background = '';
      setTimeout(() => splash.remove(), 450);
    };
    // Fallback: hide after 4s max in case boot is very slow
    window.addEventListener('load', () => setTimeout(window._hideSplash, 4000));

    // ── Service Worker ───────────────────────────────────
    if ('serviceWorker' in navigator) {
      // Auto-reload when a new SW takes control so users always get the latest version
      var _swRefreshing = false;
      var _hadSwController = !!navigator.serviceWorker.controller;
      navigator.serviceWorker.addEventListener('controllerchange', function() {
        if (!_hadSwController) { _hadSwController = true; return; } // first-ever install — no reload
        if (_swRefreshing) return;
        _swRefreshing = true;
        try {
          if (window.H && window.H.toast) {
            window.H.toast('Updating to latest version...');
            setTimeout(function() { window.location.reload(); }, 1200);
          } else {
            window.location.reload();
          }
        } catch(e) { window.location.reload(); }
      });

      navigator.serviceWorker.register('sw.js').then(function(reg) {
        if (reg.active) reg.update(); // background update check on every load
      }).catch(function() {});
    }

    // ── Network status ───────────────────────────────────
    function updateOnlineStatus() {
      const banner = document.getElementById('netBanner');
      if (banner) banner.classList.toggle('show', !navigator.onLine);
    }
    window.addEventListener('online',  updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // ── Message badge updater ────────────────────────────
    H.updateMsgBadge = function() {
      try {
        const u = H.currentUser && H.currentUser();
        const badge = document.getElementById('msgBadge');
        if (!badge) return;
        if (!u) { badge.style.display = 'none'; return; }
        if (!Array.isArray(H.state.conversations)) H.state.conversations = [];
        const convos = H.state.conversations.filter(c => Array.isArray(c.members) && c.members.includes(u.id));
        const unread = convos.reduce((n, c) =>
          n + (c.messages||[]).filter(m => m.from !== u.id && !m.read).length, 0);
        badge.textContent = unread > 9 ? '9+' : unread;
        badge.style.display = unread ? '' : 'none';
      } catch(e) {}
    };
    H.updateMsgBadge();
    window._msgBadgeInterval = setInterval(H.updateMsgBadge, 5000);

    // ── Notification badge updater ───────────────────────
    H.updateNotifBadge = function() {
      try {
        const u = H.currentUser && H.currentUser();
        const badge = document.getElementById('notifBadge');
        if (!badge) return;
        if (!u) { badge.style.display = 'none'; return; }
        const unseen = (H.state.notifications || []).filter(n => !n.read && n.userId === u.id).length;
        badge.textContent = unseen > 9 ? '9+' : unseen;
        badge.style.display = unseen > 0 ? 'flex' : 'none';
      } catch(e) {}
    };
    H.updateNotifBadge();
    window._notifBadgeInterval = setInterval(H.updateNotifBadge, 5000);

    // ── Admin page local login fallback ──────────────────
    window.addEventListener('load', () => {
      H.authAdminSignInPage = async function () {
        const email = document.getElementById('admEmailPage')?.value.trim();
        const pass  = document.getElementById('admPassPage')?.value.trim();
        if (!email || !pass) { H.toast('Enter admin credentials'); return; }
        // Try local users first
        const u = (H.state.users || []).find(x =>
          (x.email || '').toLowerCase() === email.toLowerCase() &&
          x._localPassword === pass && x.role === 'admin'
        );
        if (u) {
          H.state.currentUserId = u.id;
          H.state.adminSession  = { at: Date.now(), via: 'local' };
          H.saveState();
          H.boot();
        } else {
          H.toast('Invalid admin credentials');
          document.getElementById('bottomNav').style.display = 'flex';
        }
      };
    });

    // ── Prevent rubber-band scroll on iOS ────────────────
    document.addEventListener('touchmove', function(e) {
      if (e.target.closest('#mainArea, .action-sheet, #docSheet, .modal-body-scroll, .login-modal, .modal')) return;
      e.preventDefault();
    }, { passive: false });

    // ── Allow scroll inside doc sheet and modals ─────────
    document.getElementById('docSheetBody').addEventListener('touchmove', function(e) {
      e.stopPropagation();
    }, { passive: true });
    document.getElementById('modalBox').addEventListener('touchmove', function(e) {
      e.stopPropagation();
    }, { passive: true });

    // ── Keyboard: Escape closes modals / sheets / doc sheet ──
    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Escape') return;
      var ds = document.getElementById('docSheet');
      if (ds && ds.classList.contains('open')) { if (typeof H !== 'undefined' && H.closeDocSheet) H.closeDocSheet(); return; }
      var mb = document.getElementById('modalBg');
      if (mb && mb.classList.contains('show')) { if (typeof H !== 'undefined' && H.closeModal) H.closeModal(); return; }
      var sheet = document.getElementById('actionSheet');
      if (sheet && sheet.classList.contains('open')) { if (typeof H !== 'undefined' && H.closeSheet) H.closeSheet(); return; }
      if (typeof H !== 'undefined' && H.closeLoginModal) H.closeLoginModal();
    });
  </script>
