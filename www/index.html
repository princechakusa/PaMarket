  <!-- Inter font — display=swap saves data, only loads what's needed -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>

  <style>
    /* Splash */
    #hostlySplash {
      position: fixed; inset: 0;
      background: #1A3A8F;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 99999;
      transition: opacity .3s ease;
      font-family: 'Inter', sans-serif;
    }
    .splash-logo {
      width: 96px; height: 96px;
      border-radius: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,.25);
      animation: splashIn .6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .splash-wordmark {
      font-size: 36px; font-weight: 900;
      color: #fff; letter-spacing: -1px;
      margin-top: 16px;
      animation: splashIn .6s .15s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .splash-wordmark span { color: #F5A623; }
    @keyframes splashIn {
      from { opacity: 0; transform: translateY(20px) scale(.95); }
      to   { opacity: 1; transform: none; }
    }

    /* Action sheet — inline to guarantee it always works */
    .action-sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: #fff;
      border-radius: 22px 22px 0 0;
      padding: 22px 16px calc(22px + env(safe-area-inset-bottom));
      z-index: 9100;
      transform: translateY(100%);
      transition: transform .28s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 -8px 30px rgba(16,24,40,.12);
      border-top: 1px solid #E4E8F0;
      font-family: 'Inter', sans-serif;
    }
    .action-sheet.open { transform: translateY(0); }
    .sheet-bg {
      position: fixed; inset: 0;
      background: rgba(16,24,40,.4);
      z-index: 9050; display: none;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    .sheet-bg.open { display: block; }
    .sheet-header {
      font-size: 17px; font-weight: 800;
      margin-bottom: 18px; text-align: center;
      color: #101828; padding: 8px 0;
      letter-spacing: -.3px;
    }
    .sheet-item {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 14px;
      border-bottom: 1px solid #E4E8F0;
      cursor: pointer; font-size: 15px;
      width: 100%; text-align: left;
      background: none; border-top: none;
      border-left: none; border-right: none;
      transition: background .15s;
      font-family: 'Inter', sans-serif;
    }
    .sheet-item:active { background: #F5F7FF; }
    .sheet-item:last-of-type { border-bottom: none; }
    .sheet-item.danger { color: #B42318; }
    .sheet-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sheet-label { flex: 1; font-weight: 500; color: #101828; }
    .sheet-item.danger .sheet-label { color: #B42318; font-weight: 700; }
    .sheet-close {
      display: flex; align-items: center; justify-content: center;
      width: 100%; padding: 14px; margin-top: 12px;
      border: 1.5px solid #E4E8F0; background: transparent;
      border-radius: 12px; cursor: pointer;
      font-size: 15px; font-weight: 600; color: #344054;
      transition: all .2s; font-family: 'Inter', sans-serif;
    }
    .sheet-close:active { background: #F5F6FA; }
  </style>
</head>

  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const s = document.getElementById('hostlySplash');
        if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 300); }
      }, 1800);
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    });

    window.addEventListener('load', () => {
      H.authAdminSignInPage = async function () {
        const email = document.getElementById('admEmailPage')?.value.trim();
        const pass  = document.getElementById('admPassPage')?.value.trim();
        if (!email || !pass) { H.toast('Enter admin credentials'); return; }
        const u = (H.state.users || []).find(x =>
          (x.email || '').toLowerCase() === email.toLowerCase() &&
          x._localPassword === pass && x.role === 'admin'
        );
        if (u) {
          H.state.currentUserId = u.id;
          H.state.adminSession = { at: Date.now(), via: 'local' };
          H.saveState(); H.boot();
        } else { H.toast('Invalid admin credentials'); }
      };
    });
  </script>
