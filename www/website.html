<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaMarket — Buy &amp; Sell Anything in Zimbabwe</title>
<meta name="description" content="Zimbabwe's #1 free classified marketplace. Buy and sell property, vehicles, electronics, jobs and more.">
<link rel="icon" href="img/icon-192.png" type="image/png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1A3A8F;--primary-dark:#0f2460;--primary-mid:#2550C0;--primary-light:#EEF2FF;
  --accent:#F5A623;--accent-dark:#C47D0A;--accent-light:#FEF3C7;
  --success:#22c55e;--success-light:#dcfce7;
  --danger:#ef4444;--danger-light:#fee2e2;
  --bg:#F5F7FA;--card:#fff;--border:#E4E8F0;
  --text:#1A1A2E;--sub:#667085;--hint:#9AA3B2;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 2px 8px rgba(0,0,0,.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --r:12px;--r-sm:8px;--r-pill:999px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
button{cursor:pointer;font-family:var(--font);border:none;background:none}
input,select,textarea{font-family:var(--font)}

/* ── UTILS ── */
.hidden{display:none!important}
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.text-sub{color:var(--sub)}.text-primary{color:var(--primary)}.text-accent{color:var(--accent)}
.fw-600{font-weight:600}.fw-700{font-weight:700}.fw-800{font-weight:800}
.container{max-width:1280px;margin:0 auto;padding:0 24px}
@media(max-width:768px){.container{padding:0 16px}}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-mid)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent-dark)}
.btn-outline{background:#fff;color:var(--primary);border:1.5px solid var(--primary)}.btn-outline:hover{background:var(--primary-light)}
.btn-ghost{background:transparent;color:var(--sub);border:1.5px solid var(--border)}.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:7px 14px;font-size:13px}.btn-lg{padding:14px 28px;font-size:16px}
.btn-full{width:100%}
.btn-icon{padding:8px;border-radius:var(--r-sm)}

/* ── HEADER ── */
#site-header{position:sticky;top:0;z-index:1000;background:#fff;border-bottom:1px solid var(--border);box-shadow:var(--shadow-sm)}
.header-inner{display:flex;align-items:center;gap:16px;height:64px;max-width:1280px;margin:0 auto;padding:0 24px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-text{font-size:22px;font-weight:900;color:var(--primary);letter-spacing:-0.5px}
.logo-text span{color:var(--accent)}
.header-search-wrap{flex:1;max-width:540px;display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-pill);overflow:hidden;transition:border-color .2s}
.header-search-wrap:focus-within{border-color:var(--primary)}
.header-search-wrap input{flex:1;border:none;background:transparent;font-size:14px;color:var(--text);padding:0 14px;height:42px;outline:none}
.header-search-wrap input::placeholder{color:var(--hint)}
.header-search-wrap button{background:var(--primary);color:#fff;padding:0 16px;height:42px;font-size:13px;font-weight:700;flex-shrink:0;transition:background .2s;border:none}
.header-search-wrap button:hover{background:var(--primary-mid)}
.header-nav{display:flex;align-items:center;gap:4px;margin-left:auto;flex-shrink:0}
.nav-link{padding:8px 12px;border-radius:var(--r-sm);font-size:14px;font-weight:500;color:var(--sub);transition:all .2s;white-space:nowrap}
.nav-link:hover,.nav-link.active{color:var(--primary);background:var(--primary-light)}
.btn-post-ad{background:var(--accent);color:#fff;padding:9px 18px;border-radius:var(--r-pill);font-size:13px;font-weight:700;transition:background .2s;white-space:nowrap}
.btn-post-ad:hover{background:var(--accent-dark)}
.avatar-btn{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--primary-light);overflow:hidden}
.avatar-btn img{width:100%;height:100%;object-fit:cover}

@media(max-width:768px){
  .header-nav{display:none}
  .header-search-wrap{max-width:none}
  .header-inner{padding:0 16px}
  #site-header .logo-text{font-size:18px}
}

/* ── MOBILE BOTTOM NAV ── */
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:999;background:#fff;border-top:1px solid var(--border);padding:0;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.bottom-nav-inner{display:flex;align-items:stretch}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px 10px;font-size:10px;font-weight:600;color:var(--sub);cursor:pointer;transition:color .2s;border:none;background:none;font-family:var(--font)}
.bnav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.bnav-item.active{color:var(--primary)}
.bnav-post{background:var(--accent);color:#fff;border-radius:16px;padding:6px 12px;margin:6px 4px}
.bnav-post svg{width:20px;height:20px}
@media(max-width:768px){#bottom-nav{display:block}body{padding-bottom:72px}}

/* ── PAGES ── */
.page{display:none}.page.active{display:block}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-mid) 60%,#1e40af 100%);padding:72px 24px 80px;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
.hero-content{position:relative;z-index:1;max-width:680px;margin:0 auto}
.hero h1{font-size:clamp(28px,5vw,52px);font-weight:900;color:#fff;line-height:1.15;letter-spacing:-1px;margin-bottom:12px}
.hero h1 span{color:var(--accent)}
.hero p{font-size:clamp(15px,2.5vw,20px);color:rgba(255,255,255,.8);margin-bottom:32px}
.hero-search{display:flex;background:#fff;border-radius:var(--r-pill);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.2);max-width:600px;margin:0 auto 24px}
.hero-search input{flex:1;border:none;padding:0 20px;height:56px;font-size:16px;color:var(--text);outline:none}
.hero-search button{background:var(--accent);color:#fff;padding:0 28px;font-size:16px;font-weight:700;border:none;cursor:pointer;transition:background .2s;white-space:nowrap}
.hero-search button:hover{background:var(--accent-dark)}
.hero-tags{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.hero-tag{background:rgba(255,255,255,.15);color:#fff;padding:6px 14px;border-radius:var(--r-pill);font-size:13px;cursor:pointer;transition:background .2s;backdrop-filter:blur(4px)}
.hero-tag:hover{background:rgba(255,255,255,.25)}
@media(max-width:600px){.hero{padding:48px 16px 56px}.hero-search{flex-wrap:wrap;border-radius:var(--r)}.hero-search button{width:100%;height:48px;border-radius:0 0 var(--r) var(--r)}}

/* ── STATS BAR ── */
.stats-bar{background:#fff;border-bottom:1px solid var(--border)}
.stats-inner{display:flex;align-items:center;justify-content:center;gap:32px;padding:20px 24px;max-width:1280px;margin:0 auto;flex-wrap:wrap}
.stat-item{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--sub)}
.stat-item strong{color:var(--text);font-size:18px;font-weight:800}
.stat-divider{width:1px;height:24px;background:var(--border)}
@media(max-width:600px){.stats-inner{gap:20px}.stat-divider{display:none}}

/* ── SECTION ── */
.section{padding:48px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.section-title{font-size:24px;font-weight:800;color:var(--text)}
.section-link{font-size:14px;font-weight:600;color:var(--primary)}
@media(max-width:768px){.section{padding:32px 0}.section-title{font-size:20px}}

/* ── CATEGORY GRID ── */
.cat-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:12px}
.cat-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:20px 8px;text-align:center;cursor:pointer;transition:all .2s}
.cat-card:hover{border-color:var(--primary);background:var(--primary-light);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.cat-icon{font-size:32px;margin-bottom:8px}
.cat-name{font-size:12px;font-weight:700;color:var(--text)}
.cat-count{font-size:11px;color:var(--sub);margin-top:2px}
@media(max-width:900px){.cat-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:480px){.cat-grid{grid-template-columns:repeat(4,1fr);gap:8px}.cat-card{padding:14px 6px}.cat-icon{font-size:24px}}

/* ── AD CARDS ── */
.ads-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.ads-grid-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1100px){.ads-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.ads-grid{grid-template-columns:repeat(2,1fr);gap:12px}}
@media(max-width:420px){.ads-grid{grid-template-columns:repeat(2,1fr);gap:8px}}

.ad-card{background:#fff;border-radius:var(--r);overflow:hidden;border:1.5px solid var(--border);cursor:pointer;transition:all .2s;position:relative}
.ad-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--primary)}
.ad-card.sponsored{border-color:var(--accent);border-width:2px}
.ad-card.featured{border-color:#f59e0b}
.ad-img-wrap{position:relative;aspect-ratio:4/3;overflow:hidden;background:#f1f5f9}
.ad-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s;loading:lazy}
.ad-card:hover .ad-img-wrap img{transform:scale(1.04)}
.ad-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;background:#f1f5f9}
.ad-badge{position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:var(--r-pill);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.badge-featured{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.badge-sponsored{background:var(--accent);color:#fff}
.badge-pending{background:var(--sub);color:#fff}
.save-btn{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.save-btn svg{width:16px;height:16px;stroke:var(--sub);fill:none;transition:all .2s}
.save-btn.saved svg{stroke:var(--danger);fill:var(--danger)}
.save-btn:hover svg{stroke:var(--danger)}
.ad-info{padding:12px}
.ad-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.ad-price{font-size:18px;font-weight:800;color:var(--primary);margin-bottom:6px}
.ad-price.negotiable::after{content:'· Nego';font-size:11px;font-weight:600;color:var(--sub);margin-left:4px}
.ad-meta{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub)}
.ad-meta-dot{color:var(--border)}
@media(max-width:480px){.ad-info{padding:10px}.ad-title{font-size:13px}.ad-price{font-size:16px}}

/* ── SKELETON ── */
.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{background:#fff;border-radius:var(--r);overflow:hidden;border:1.5px solid var(--border)}
.skel-img{width:100%;aspect-ratio:4/3}
.skel-line{height:14px;border-radius:4px;margin:8px 12px}
.skel-line.short{width:60%;margin-top:4px}

/* ── FEATURED ADS ── */
.featured-scroll{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none}
.featured-scroll::-webkit-scrollbar{display:none}
.featured-scroll .ad-card{flex:0 0 260px}

/* ── CTA BANNER ── */
.cta-banner{background:linear-gradient(135deg,var(--accent) 0%,#f97316 100%);border-radius:var(--r);padding:48px 40px;display:flex;align-items:center;justify-content:space-between;gap:24px;overflow:hidden;position:relative}
.cta-banner::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.1)}
.cta-text h2{font-size:28px;font-weight:900;color:#fff;margin-bottom:8px}
.cta-text p{font-size:16px;color:rgba(255,255,255,.85)}
.cta-banner .btn{background:#fff;color:var(--accent);font-weight:800;padding:14px 32px;font-size:15px;flex-shrink:0}
@media(max-width:600px){.cta-banner{flex-direction:column;text-align:center;padding:32px 24px}.cta-banner .btn{width:100%}.cta-text h2{font-size:22px}}

/* ── APP DOWNLOAD ── */
.app-section{background:var(--primary);border-radius:var(--r);padding:48px;display:flex;align-items:center;justify-content:space-between;gap:32px}
.app-text h2{font-size:28px;font-weight:900;color:#fff;margin-bottom:8px}
.app-text p{color:rgba(255,255,255,.75);font-size:15px;margin-bottom:24px}
.app-badges{display:flex;gap:12px;flex-wrap:wrap}
.app-badge{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);border-radius:var(--r-sm);padding:10px 18px;color:#fff;transition:background .2s;cursor:pointer}
.app-badge:hover{background:rgba(255,255,255,.2)}
.app-badge-icon{font-size:28px}
.app-badge-text{display:flex;flex-direction:column}
.app-badge-text small{font-size:11px;opacity:.7}
.app-badge-text strong{font-size:15px;font-weight:700}
.app-phone{width:160px;flex-shrink:0}
@media(max-width:768px){.app-section{padding:32px 24px}.app-phone{display:none}.app-text h2{font-size:22px}}

/* ── FOOTER ── */
footer{background:var(--primary-dark);color:rgba(255,255,255,.8);padding:48px 0 24px;margin-top:64px}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:32px;margin-bottom:40px}
.footer-brand p{font-size:14px;line-height:1.7;margin-top:12px;max-width:280px}
.footer-col h4{font-size:13px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.5px;margin-bottom:16px}
.footer-col a{display:block;font-size:14px;color:rgba(255,255,255,.7);margin-bottom:10px;transition:color .2s}
.footer-col a:hover{color:#fff}
.footer-bottom{border-top:1px solid rgba(255,255,255,.1);padding-top:24px;display:flex;align-items:center;justify-content:space-between;font-size:13px}
.footer-logo-text{font-size:20px;font-weight:900;color:#fff}
.footer-logo-text span{color:var(--accent)}
@media(max-width:900px){.footer-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.footer-grid{grid-template-columns:1fr}.footer-bottom{flex-direction:column;gap:8px;text-align:center}}

/* ── BROWSE PAGE ── */
.browse-layout{display:flex;gap:0;min-height:60vh}
.filter-sidebar{width:260px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);padding:24px;position:sticky;top:65px;height:calc(100vh - 65px);overflow-y:auto}
.browse-main{flex:1;min-width:0;padding:24px}
.filter-group{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.filter-group:last-child{border-bottom:none}
.filter-group label{display:block;font-size:13px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.filter-select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--text);background:#fff;outline:none;cursor:pointer;transition:border-color .2s}
.filter-select:focus{border-color:var(--primary)}
.price-row{display:flex;gap:8px;align-items:center}
.price-input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .2s}
.price-input:focus{border-color:var(--primary)}
.browse-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.results-count{font-size:15px;font-weight:600;color:var(--text)}
.results-count span{color:var(--sub);font-weight:400}
.sort-select{padding:9px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--text);background:#fff;outline:none;cursor:pointer}
.mobile-filter-bar{display:none;background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;gap:8px;overflow-x:auto;scrollbar-width:none}
.mobile-filter-bar::-webkit-scrollbar{display:none}
.filter-chip{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--r-pill);font-size:13px;font-weight:500;color:var(--sub);cursor:pointer;white-space:nowrap;background:#fff;transition:all .2s;flex-shrink:0}
.filter-chip.active,.filter-chip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.load-more-wrap{text-align:center;padding:32px 0}
.empty-state{text-align:center;padding:64px 24px;color:var(--sub)}
.empty-state-icon{font-size:64px;margin-bottom:16px}
.empty-state h3{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px}
@media(max-width:768px){.filter-sidebar{display:none}.mobile-filter-bar{display:flex}.browse-main{padding:16px}.browse-layout{flex-direction:column}}

/* ── AD DETAIL ── */
.detail-layout{display:grid;grid-template-columns:1fr 360px;gap:32px;padding:32px 0}
.detail-gallery{border-radius:var(--r);overflow:hidden;background:#f1f5f9;aspect-ratio:4/3;margin-bottom:16px;position:relative}
.detail-gallery img{width:100%;height:100%;object-fit:cover}
.gallery-thumbs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.gallery-thumbs::-webkit-scrollbar{display:none}
.gallery-thumb{width:72px;height:56px;border-radius:var(--r-sm);overflow:hidden;flex-shrink:0;cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.gallery-thumb.active,.gallery-thumb:hover{border-color:var(--primary)}
.gallery-thumb img{width:100%;height:100%;object-fit:cover}
.detail-title{font-size:24px;font-weight:800;color:var(--text);margin-bottom:8px}
.detail-price{font-size:32px;font-weight:900;color:var(--primary);margin-bottom:16px}
.detail-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.detail-meta-item{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--sub)}
.detail-meta-item svg{width:16px;height:16px;stroke:currentColor;fill:none}
.detail-desc{font-size:15px;line-height:1.8;color:var(--text);margin-bottom:24px;white-space:pre-wrap}
.detail-section-title{font-size:16px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--sub);margin-bottom:20px;flex-wrap:wrap}
.breadcrumb a{color:var(--sub);transition:color .2s}.breadcrumb a:hover{color:var(--primary)}
.breadcrumb-sep{color:var(--border)}
.seller-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:20px;position:sticky;top:80px}
.seller-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.seller-avatar{width:52px;height:52px;border-radius:50%;background:var(--primary);color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.seller-avatar img{width:100%;height:100%;object-fit:cover}
.seller-name{font-size:16px;font-weight:700}
.verified-badge{display:inline-flex;align-items:center;gap:4px;background:var(--success-light);color:var(--success);padding:3px 8px;border-radius:var(--r-pill);font-size:11px;font-weight:700;margin-top:4px}
.seller-joined{font-size:12px;color:var(--sub);margin-top:2px}
.contact-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:var(--r-sm);font-size:15px;font-weight:700;cursor:pointer;border:none;transition:all .2s;margin-bottom:10px;font-family:var(--font)}
.btn-whatsapp{background:#25D366;color:#fff}.btn-whatsapp:hover{background:#1ebe5d}
.btn-call{background:var(--primary);color:#fff}.btn-call:hover{background:var(--primary-mid)}
.btn-chat{background:#fff;color:var(--text);border:1.5px solid var(--border)}.btn-chat:hover{border-color:var(--primary);color:var(--primary)}
.contact-btn svg{width:20px;height:20px}
.report-link{display:block;text-align:center;font-size:13px;color:var(--sub);margin-top:12px;cursor:pointer;transition:color .2s}.report-link:hover{color:var(--danger)}
.detail-sticky-bottom{display:none}
@media(max-width:900px){.detail-layout{grid-template-columns:1fr}.seller-card{position:static}.detail-sticky-bottom{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:12px 16px;gap:8px;z-index:100}.detail-sticky-bottom button{flex:1}}

/* ── POST AD ── */
.post-container{max-width:720px;margin:0 auto;padding:32px 24px}
.step-indicator{display:flex;align-items:center;gap:0;margin-bottom:40px}
.step{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;top:18px;left:50%;width:100%;height:2px;background:var(--border)}
.step:not(:last-child).completed::after{background:var(--primary)}
.step-num{width:36px;height:36px;border-radius:50%;background:var(--border);color:var(--sub);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:1;transition:all .3s}
.step.active .step-num{background:var(--primary);color:#fff}
.step.completed .step-num{background:var(--success);color:#fff}
.step-label{font-size:12px;font-weight:600;color:var(--sub)}
.step.active .step-label{color:var(--primary)}
.form-section{background:#fff;border-radius:var(--r);padding:32px;margin-bottom:24px;border:1.5px solid var(--border)}
.form-section h2{font-size:22px;font-weight:800;margin-bottom:8px}
.form-section p{color:var(--sub);margin-bottom:24px;font-size:15px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px}
.form-label span{color:var(--danger)}
.form-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;color:var(--text);background:#fff;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--primary)}
.form-textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;color:var(--text);background:#fff;outline:none;resize:vertical;min-height:140px;transition:border-color .2s}
.form-textarea:focus{border-color:var(--primary)}
.form-select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;color:var(--text);background:#fff;outline:none;cursor:pointer;transition:border-color .2s}
.form-select:focus{border-color:var(--primary)}
.cat-select-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.cat-select-item{border:2px solid var(--border);border-radius:var(--r);padding:16px 8px;text-align:center;cursor:pointer;transition:all .2s}
.cat-select-item:hover{border-color:var(--primary);background:var(--primary-light)}
.cat-select-item.selected{border-color:var(--primary);background:var(--primary-light)}
.cat-select-item .cat-icon{font-size:28px;margin-bottom:6px}
.cat-select-item .cat-name{font-size:12px;font-weight:700;color:var(--text)}
.price-input-wrap{display:flex;gap:12px;align-items:center}
.currency-sel{flex-shrink:0;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;background:#fff;cursor:pointer;outline:none}
.img-upload-area{border:2px dashed var(--border);border-radius:var(--r);padding:32px;text-align:center;cursor:pointer;transition:all .2s}
.img-upload-area:hover{border-color:var(--primary);background:var(--primary-light)}
.img-upload-area input{display:none}
.img-previews{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.img-preview-item{position:relative;width:90px;height:90px;border-radius:var(--r-sm);overflow:hidden;border:1.5px solid var(--border)}
.img-preview-item img{width:100%;height:100%;object-fit:cover}
.img-remove{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px}
.post-option-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.post-option-card{border:2px solid var(--border);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:all .2s}
.post-option-card:hover,.post-option-card.selected{border-color:var(--primary);background:var(--primary-light)}
.post-option-card h3{font-size:18px;font-weight:700;margin-bottom:8px}
.post-option-card p{font-size:14px;color:var(--sub)}
.form-nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.success-screen{text-align:center;padding:48px 24px}
.success-icon{font-size:72px;margin-bottom:16px}
.success-screen h2{font-size:28px;font-weight:800;margin-bottom:8px}
.success-screen p{color:var(--sub);font-size:16px;margin-bottom:32px}
@media(max-width:600px){.cat-select-grid{grid-template-columns:repeat(4,1fr)}.post-option-cards{grid-template-columns:1fr}.form-section{padding:20px}}

/* ── DASHBOARD ── */
.dashboard-layout{display:grid;grid-template-columns:240px 1fr;gap:0;min-height:70vh}
.dash-sidebar{background:#fff;border-right:1px solid var(--border);padding:24px 0;position:sticky;top:65px;height:calc(100vh - 65px);overflow-y:auto}
.dash-nav-item{display:flex;align-items:center;gap:12px;padding:12px 24px;font-size:14px;font-weight:500;color:var(--sub);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.dash-nav-item svg{width:18px;height:18px;stroke:currentColor;fill:none;flex-shrink:0}
.dash-nav-item.active,.dash-nav-item:hover{background:var(--primary-light);color:var(--primary);border-left-color:var(--primary)}
.dash-content{padding:32px}
.dash-tabs{display:none}
.my-ads-header{display:flex;gap:0;background:var(--bg);border-radius:var(--r-sm);padding:4px;margin-bottom:24px;display:inline-flex}
.ads-tab{padding:8px 20px;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;color:var(--sub);transition:all .2s}
.ads-tab.active{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm)}
.my-ad-item{display:flex;gap:16px;background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px;align-items:center}
.my-ad-img{width:90px;height:72px;border-radius:var(--r-sm);overflow:hidden;flex-shrink:0;background:#f1f5f9}
.my-ad-img img{width:100%;height:100%;object-fit:cover}
.my-ad-info{flex:1;min-width:0}
.my-ad-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-ad-price{font-size:16px;font-weight:800;color:var(--primary);margin:4px 0}
.my-ad-meta{font-size:13px;color:var(--sub)}
.my-ad-actions{display:flex;gap:8px;flex-shrink:0}
.status-badge{display:inline-block;padding:3px 10px;border-radius:var(--r-pill);font-size:11px;font-weight:700;text-transform:uppercase}
.status-active{background:var(--success-light);color:var(--success)}
.status-pending{background:var(--accent-light);color:var(--accent-dark)}
.status-sold{background:#f1f5f9;color:var(--sub)}
.profile-form{max-width:560px}
.saved-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){.dashboard-layout{grid-template-columns:1fr}.dash-sidebar{display:none}.dash-tabs{display:flex;overflow-x:auto;scrollbar-width:none;background:#fff;border-bottom:1px solid var(--border)}.dash-tab-item{flex-shrink:0;padding:14px 20px;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}.dash-tab-item.active{color:var(--primary);border-bottom-color:var(--primary)}.dash-content{padding:16px}.saved-grid{grid-template-columns:repeat(2,1fr)}}

/* ── MESSAGES ── */
.msg-layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - 65px);background:#fff}
.conv-list{border-right:1px solid var(--border);overflow-y:auto}
.conv-header{padding:16px 20px;border-bottom:1px solid var(--border);font-size:18px;font-weight:800}
.conv-item{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;transition:background .2s;border-bottom:1px solid var(--border)}
.conv-item:hover,.conv-item.active{background:var(--primary-light)}
.conv-avatar{width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{font-size:13px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-time{font-size:11px;color:var(--hint);flex-shrink:0}
.conv-unread{background:var(--primary);color:#fff;font-size:11px;font-weight:700;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.chat-window{display:flex;flex-direction:column}
.chat-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.msg-bubble-wrap{display:flex;gap:8px}.msg-bubble-wrap.mine{flex-direction:row-reverse}
.msg-bubble{max-width:70%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5}
.msg-bubble.theirs{background:var(--bg);color:var(--text);border-bottom-left-radius:4px}
.msg-bubble.mine{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.msg-time{font-size:11px;color:var(--hint);align-self:flex-end}
.chat-input-wrap{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:flex-end}
.chat-input{flex:1;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--r-pill);font-size:14px;color:var(--text);outline:none;resize:none;max-height:120px;transition:border-color .2s}
.chat-input:focus{border-color:var(--primary)}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--sub);font-size:15px}
@media(max-width:768px){.msg-layout{grid-template-columns:1fr}.conv-list{height:100%}.chat-window{display:none;height:100vh;position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;background:#fff}.chat-window.mobile-open{display:flex}}

/* ── ADVERTISE ── */
.advertise-hero{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-mid) 100%);padding:80px 24px;text-align:center;color:#fff}
.advertise-hero h1{font-size:clamp(28px,5vw,52px);font-weight:900;margin-bottom:16px}
.advertise-hero p{font-size:18px;opacity:.85;max-width:560px;margin:0 auto 32px}
.adv-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.adv-card{background:#fff;border-radius:var(--r);padding:32px;border:1.5px solid var(--border);text-align:center;transition:all .2s}
.adv-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--primary)}
.adv-card-icon{font-size:48px;margin-bottom:16px}
.adv-card h3{font-size:20px;font-weight:800;margin-bottom:8px}
.adv-card p{font-size:14px;color:var(--sub);line-height:1.7;margin-bottom:20px}
.adv-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;padding:48px 0;text-align:center}
.adv-stat-num{font-size:40px;font-weight:900;color:var(--primary)}
.adv-stat-label{font-size:14px;color:var(--sub);margin-top:6px}
@media(max-width:768px){.adv-cards{grid-template-columns:1fr}.adv-stats{grid-template-columns:repeat(2,1fr)}}

/* ── ADMIN ── */
.admin-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.admin-stat-card{background:#fff;border-radius:var(--r);padding:24px;border:1.5px solid var(--border)}
.admin-stat-num{font-size:36px;font-weight:900;color:var(--primary)}
.admin-stat-label{font-size:14px;color:var(--sub);margin-top:4px}
.admin-tabs{display:flex;gap:0;background:var(--bg);border-radius:var(--r-sm);padding:4px;margin-bottom:24px;display:inline-flex;overflow-x:auto;scrollbar-width:none;width:100%}
.admin-tab{padding:10px 20px;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;color:var(--sub);transition:all .2s;white-space:nowrap}
.admin-tab.active{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm)}
.admin-listing-card{display:flex;gap:16px;background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.admin-listing-img{width:100px;height:80px;border-radius:var(--r-sm);overflow:hidden;flex-shrink:0;background:#f1f5f9}
.admin-listing-img img{width:100%;height:100%;object-fit:cover}
.admin-listing-info{flex:1;min-width:0}
.admin-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.user-row{display:flex;align-items:center;gap:16px;background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.user-avatar-sm{width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
@media(max-width:900px){.admin-stats{grid-template-columns:repeat(2,1fr)}}

/* ── AUTH MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-box{background:#fff;border-radius:var(--r);padding:32px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal-box h2{font-size:24px;font-weight:800;margin-bottom:4px}
.modal-box p{color:var(--sub);margin-bottom:24px;font-size:15px}
.modal-tabs{display:flex;gap:0;background:var(--bg);border-radius:var(--r-sm);padding:4px;margin-bottom:24px}
.modal-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;color:var(--sub);border-radius:6px;transition:all .2s}
.modal-tab.active{background:#fff;color:var(--primary);box-shadow:var(--shadow-sm)}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px}

/* ── TOAST ── */
#toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:12px 20px;border-radius:var(--r-pill);font-size:14px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:auto;max-width:320px;text-align:center}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}

/* ── PROMO CARDS (advertise) ── */
.promo-type-card{border:2px solid var(--border);border-radius:var(--r);padding:24px;cursor:pointer;transition:all .2s}
.promo-type-card:hover,.promo-type-card.selected{border-color:var(--primary);background:var(--primary-light)}
.promo-type-card.sponsored-card{border-color:var(--accent)}.promo-type-card.sponsored-card:hover,.promo-type-card.sponsored-card.selected{background:var(--accent-light);border-color:var(--accent-dark)}
.promo-preview{border-radius:var(--r-sm);padding:12px;margin-top:12px;font-size:13px}
.promo-preview.featured-preview{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid #f59e0b}
.promo-preview.sponsored-preview{background:var(--accent-light);border:2px solid var(--accent)}

/* ── MISC ── */
.divider{border:none;border-top:1px solid var(--border);margin:24px 0}
.text-center{text-align:center}
.mt-16{margin-top:16px}.mt-24{margin-top:24px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.loading-spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.page-loader{display:flex;align-items:center;justify-content:center;padding:64px;flex-direction:column;gap:16px;color:var(--sub)}
</style>
</head>
<body>
