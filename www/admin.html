<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostly</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;}

/* ── LOGIN ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:#1e293b;border-radius:20px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 25px 50px rgba(0,0,0,.55);}
.login-logo{font-size:30px;font-weight:800;text-align:center;margin-bottom:6px;letter-spacing:-1px;}
.login-logo em{font-style:normal;color:#3b82f6;}
.login-sub{font-size:13px;color:#64748b;text-align:center;margin-bottom:28px;}
.fg{margin-bottom:15px;}
.fl{font-size:12px;color:#94a3b8;margin-bottom:6px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.fi{width:100%;padding:12px 14px;background:#0f172a;border:1.5px solid #334155;border-radius:10px;color:#e2e8f0;font-size:14px;outline:none;transition:border-color .2s;}
.fi:focus{border-color:#3b82f6;}
.btn-login{width:100%;padding:13px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .2s;}
.btn-login:hover{background:#2563eb;}
.btn-login:disabled{opacity:.55;cursor:not-allowed;}
.err-box{background:rgba(127,29,29,.7);color:#fca5a5;border:1px solid #991b1b;padding:11px 13px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;line-height:1.5;}

/* ── DASHBOARD ── */
#dash{display:none;}
.hdr{background:#1e293b;padding:0 20px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #334155;height:56px;position:sticky;top:0;z-index:200;}
.hdr-brand{font-size:19px;font-weight:800;flex:1;letter-spacing:-0.5px;}
.hdr-brand em{font-style:normal;color:#3b82f6;}
.hdr-btn{border:none;padding:7px 13px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;transition:all .2s;}
.btn-refresh{background:#1e3a5f;color:#93c5fd;}
.btn-refresh:hover{background:#1e40af;}
.btn-logout{background:#450a0a;color:#fca5a5;}
.btn-logout:hover{background:#7f1d1d;}

.body{padding:20px;max-width:1400px;margin:0 auto;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
.stat-card{background:#1e293b;border-radius:12px;padding:16px 14px;border:1px solid #334155;transition:border-color .2s;}
.stat-card:hover{border-color:#475569;}
.stat-n{font-size:28px;font-weight:800;color:#3b82f6;line-height:1;}
.stat-n.warn{color:#f59e0b;}
.stat-n.danger{color:#f87171;}
.stat-l{font-size:11px;color:#64748b;margin-top:5px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}

/* Alerts */
.alerts{margin-bottom:16px;display:flex;flex-direction:column;gap:8px;}
.alert{background:#1c1917;border-left:3px solid #f59e0b;padding:10px 14px;border-radius:0 8px 8px 0;font-size:13px;color:#fbbf24;display:flex;align-items:center;gap:8px;}
.alert.red{border-color:#ef4444;color:#f87171;background:#1c0909;}

/* Tabs */
.tabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap;}
.tab{padding:8px 15px;border-radius:8px;border:1px solid #334155;cursor:pointer;font-size:12px;font-weight:600;background:#1e293b;color:#64748b;transition:all .2s;white-space:nowrap;}
.tab:hover{color:#e2e8f0;border-color:#475569;}
.tab.on{background:#3b82f6;color:#fff;border-color:#3b82f6;}
.pnl{display:none;}
.pnl.on{display:block;}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.search-box{flex:1;min-width:180px;padding:9px 13px;background:#1e293b;border:1.5px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .2s;}
.search-box:focus{border-color:#3b82f6;}
.filter-sel{padding:9px 10px;background:#1e293b;border:1.5px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;cursor:pointer;transition:border-color .2s;}
.filter-sel:focus{border-color:#3b82f6;}

/* Table */
.tbl-wrap{background:#1e293b;border-radius:12px;overflow:auto;border:1px solid #334155;}
table{width:100%;border-collapse:collapse;min-width:600px;}
th{text-align:left;padding:11px 12px;font-size:10px;color:#475569;border-bottom:1px solid #334155;white-space:nowrap;text-transform:uppercase;letter-spacing:.6px;font-weight:700;}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(51,65,85,.5);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(59,130,246,.03);}

/* Badges */
.b{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;display:inline-block;letter-spacing:.3px;}
.b-active{background:#14532d;color:#86efac;}
.b-pending{background:#713f12;color:#fde68a;}
.b-rejected{background:#7f1d1d;color:#fca5a5;}
.b-removed{background:#1f2937;color:#6b7280;}
.b-banned{background:#7f1d1d;color:#fca5a5;}
.b-suspended{background:#451a03;color:#fb923c;}
.b-blue{background:#1e3a5f;color:#93c5fd;}
.b-green{background:#14532d;color:#86efac;}
.b-open{background:#713f12;color:#fde68a;}
.b-resolved{background:#14532d;color:#86efac;}
.b-admin{background:#4c1d95;color:#c4b5fd;}
.b-moderator{background:#0c4a6e;color:#7dd3fc;}

/* Action buttons */
.actions{display:flex;gap:4px;flex-wrap:wrap;}
.ab{padding:4px 9px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700;transition:all .2s;white-space:nowrap;}
.ab:hover{filter:brightness(1.2);}
.ab-view{background:#1e3a5f;color:#93c5fd;}
.ab-edit{background:#1c2a5e;color:#a5b4fc;}
.ab-approve{background:#14532d;color:#86efac;}
.ab-reject{background:#78350f;color:#fde68a;}
.ab-remove{background:#1f2937;color:#6b7280;}
.ab-delete{background:#450a0a;color:#fca5a5;}
.ab-ban{background:#7f1d1d;color:#fca5a5;}
.ab-unban{background:#14532d;color:#86efac;}
.ab-resolve{background:#14532d;color:#86efac;}
.ab-verify{background:#1e3a5f;color:#7dd3fc;}
.ab-credit{background:#14532d;color:#86efac;}

/* Section headings */
.section-head{font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #334155;}
.section-sub{font-size:12px;color:#64748b;margin-bottom:16px;}

/* Wallet adjustment card */
.wallet-section{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155;margin-bottom:20px;}
.wallet-search-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.wallet-result{background:#0f172a;border-radius:10px;padding:16px;border:1px solid #334155;margin-bottom:12px;}
.wallet-result-name{font-weight:700;font-size:14px;margin-bottom:4px;}
.wallet-result-meta{font-size:12px;color:#64748b;margin-bottom:12px;}
.wallet-adjust-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.adj-input{width:140px;padding:9px 12px;background:#1e293b;border:1.5px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;}
.adj-input:focus{border-color:#3b82f6;}

/* Top wallet users */
.top-users-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.top-user-card{background:#1e293b;border-radius:10px;padding:14px;border:1px solid #334155;display:flex;align-items:center;gap:12px;}
.top-user-rank{font-size:18px;font-weight:800;color:#475569;width:28px;text-align:center;flex-shrink:0;}
.top-user-rank.gold{color:#f59e0b;}
.top-user-rank.silver{color:#94a3b8;}
.top-user-rank.bronze{color:#b45309;}
.top-user-info{flex:1;min-width:0;}
.top-user-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top-user-phone{font-size:11px;color:#64748b;margin-top:2px;}
.top-user-bal{font-size:16px;font-weight:800;color:#3b82f6;white-space:nowrap;}

/* Alert section */
.alert-section{background:#1e293b;border-radius:12px;padding:20px;border:1px solid #334155;margin-bottom:20px;}
.alert-form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:600px){.alert-form-row{grid-template-columns:1fr;}}
.alert-textarea{width:100%;padding:11px 13px;background:#0f172a;border:1.5px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;resize:vertical;min-height:90px;transition:border-color .2s;}
.alert-textarea:focus{border-color:#3b82f6;}
.target-count{font-size:12px;color:#64748b;margin-bottom:10px;}
.target-count b{color:#3b82f6;}
.btn-send{padding:11px 24px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-send:hover{background:#2563eb;}
.btn-send:disabled{opacity:.5;cursor:not-allowed;}

/* Error logs */
.log-meta{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.btn-clear-logs{padding:7px 13px;background:#450a0a;color:#fca5a5;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-clear-logs:hover{background:#7f1d1d;}

/* Empty / loading */
.empty{color:#475569;padding:48px 24px;text-align:center;font-size:13px;}
.empty-icon{font-size:32px;margin-bottom:10px;}
.loading-msg{color:#475569;padding:48px;text-align:center;font-style:italic;font-size:13px;}
.empty-msg{background:#1e293b;border-radius:10px;padding:24px;border:1px solid #334155;color:#64748b;font-size:13px;text-align:center;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.modal-overlay.hidden{display:none;}
.modal{background:#1e293b;border-radius:16px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border:1px solid #334155;box-shadow:0 30px 70px rgba(0,0,0,.7);}
.modal-hdr{padding:17px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#1e293b;z-index:1;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;color:#475569;font-size:20px;cursor:pointer;line-height:1;padding:2px 7px;border-radius:5px;}
.modal-close:hover{color:#e2e8f0;background:#334155;}
.modal-body{padding:20px;}
.modal-footer{padding:13px 20px;border-top:1px solid #334155;display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}
.mfg{margin-bottom:14px;}
.mfl{font-size:11px;color:#94a3b8;margin-bottom:5px;display:block;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.mfi{width:100%;padding:10px 12px;background:#0f172a;border:1.5px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;transition:border-color .2s;}
.mfi:focus{border-color:#3b82f6;}
.mfi-sel{width:100%;padding:10px 12px;background:#0f172a;border:1.5px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;cursor:pointer;transition:border-color .2s;}
.mfi-sel:focus{border-color:#3b82f6;}
.mfi-ta{width:100%;padding:10px 12px;background:#0f172a;border:1.5px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;resize:vertical;min-height:70px;transition:border-color .2s;}
.mfi-ta:focus{border-color:#3b82f6;}
.btn-save{padding:10px 22px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-save:hover{background:#2563eb;}
.btn-save:disabled{opacity:.55;cursor:not-allowed;}
.btn-cancel{padding:10px 18px;background:#334155;color:#e2e8f0;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .2s;}
.btn-cancel:hover{background:#475569;}
.btn-danger{padding:10px 18px;background:#7f1d1d;color:#fca5a5;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:background .2s;}
.btn-danger:hover{background:#991b1b;}

/* Info rows */
.info-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:8px 0;border-bottom:1px solid rgba(51,65,85,.5);font-size:13px;}
.info-row:last-child{border-bottom:none;}
.info-label{color:#475569;flex-shrink:0;font-weight:600;}
.info-val{font-weight:600;text-align:right;word-break:break-all;}
.info-desc{color:#94a3b8;font-size:12px;line-height:1.5;margin-top:6px;padding-top:6px;border-top:1px solid #334155;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:11px 16px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:300px;box-shadow:0 10px 30px rgba(0,0,0,.4);line-height:1.4;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:#166534;background:#14532d;color:#86efac;}
.toast.error{border-color:#dc2626;background:#7f1d1d;color:#fca5a5;}

/* Confirm */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.confirm-overlay.hidden{display:none;}
.confirm-box{background:#1e293b;border-radius:14px;padding:28px 24px;max-width:360px;width:100%;border:1px solid #334155;text-align:center;}
.confirm-icon{font-size:38px;margin-bottom:14px;}
.confirm-title{font-size:16px;font-weight:700;margin-bottom:8px;}
.confirm-msg{font-size:13px;color:#94a3b8;margin-bottom:22px;line-height:1.55;}
.confirm-input{width:100%;padding:10px 12px;background:#0f172a;border:1.5px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px;outline:none;margin-bottom:16px;transition:border-color .2s;}
.confirm-input:focus{border-color:#3b82f6;}
.confirm-btns{display:flex;gap:8px;justify-content:center;}

/* Responsive */
@media(max-width:640px){
  .hdr{padding:0 12px;}
  .body{padding:12px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .tab{font-size:11px;padding:7px 10px;}
  .top-users-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .top-users-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════ LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">Host<em>ly</em></div>
    <div class="login-sub">Internal Tools</div>
    <div class="err-box" id="errMsg"></div>
    <div class="fg">
      <label class="fl">Email</label>
      <input class="fi" id="aEmail" type="email" autocomplete="username">
    </div>
    <div class="fg">
      <label class="fl">Password</label>
      <input class="fi" id="aPass" type="password" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn">Sign In</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════ DASHBOARD -->
<div id="dash">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-brand">Host<em>ly</em></div>
    <button class="hdr-btn btn-refresh" id="refreshBtn">&#8635; Refresh</button>
    <button class="hdr-btn btn-logout" id="logoutBtn">Sign Out</button>
  </div>

  <div class="body">

    <!-- Stats -->
    <div class="stats-grid" id="statsDiv"></div>

    <!-- Alerts -->
    <div class="alerts" id="alertsDiv"></div>

    <!-- Tabs -->
    <div class="tabs" id="tabsRow">
      <button class="tab on" data-tab="1">Overview</button>
      <button class="tab" data-tab="2">Listings</button>
      <button class="tab" data-tab="3">Users</button>
      <button class="tab" data-tab="4">Top-Ups</button>
      <button class="tab" data-tab="5">Reports</button>
      <button class="tab" data-tab="6">Error Logs</button>
      <button class="tab" data-tab="7">Send Alert</button>
    </div>

    <!-- ── Panel 1: Overview ── -->
    <div class="pnl on" id="pnl1">
      <div id="overviewContent"><p class="loading-msg">Loading overview...</p></div>
    </div>

    <!-- ── Panel 2: Listings ── -->
    <div class="pnl" id="pnl2">
      <div class="toolbar">
        <input class="search-box" id="listSearch" placeholder="Search by title, seller, category..." oninput="renderListings()">
        <select class="filter-sel" id="listFilter" onchange="renderListings()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="active">Active</option>
          <option value="rejected">Rejected</option>
          <option value="removed">Removed</option>
        </select>
      </div>
      <div id="listContent"><p class="loading-msg">Loading listings...</p></div>
    </div>

    <!-- ── Panel 3: Users ── -->
    <div class="pnl" id="pnl3">
      <div class="toolbar">
        <input class="search-box" id="userSearch" placeholder="Search by name or phone..." oninput="renderUsers()">
        <select class="filter-sel" id="userFilter" onchange="renderUsers()">
          <option value="">All Statuses</option>
          <option value="active">Active</option>
          <option value="banned">Banned</option>
          <option value="suspended">Suspended</option>
        </select>
      </div>
      <div id="userContent"><p class="loading-msg">Loading users...</p></div>
    </div>

    <!-- ── Panel 4: Top-Ups ── -->
    <div class="pnl" id="pnl4">
      <div id="topupContent"><p class="loading-msg">Loading...</p></div>
    </div>

    <!-- ── Panel 5: Reports ── -->
    <div class="pnl" id="pnl5">
      <div class="toolbar">
        <input class="search-box" id="reportSearch" placeholder="Search reports..." oninput="renderReports()">
        <select class="filter-sel" id="reportFilter" onchange="renderReports()">
          <option value="">All Statuses</option>
          <option value="open">Open</option>
          <option value="resolved">Resolved</option>
        </select>
      </div>
      <div id="reportContent"><p class="loading-msg">Loading reports...</p></div>
    </div>

    <!-- ── Panel 6: Error Logs ── -->
    <div class="pnl" id="pnl6">
      <div id="errorContent"><p class="loading-msg">Loading error logs...</p></div>
    </div>

    <!-- ── Panel 7: Send Alert ── -->
    <div class="pnl" id="pnl7">
      <div id="alertContent"></div>
    </div>

  </div><!-- /body -->
</div><!-- /dash -->

<!-- ══════════════════════════════════════════════════════ MODAL -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-hdr">
      <div class="modal-title" id="modalTitle">Details</div>
      <button class="modal-close" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════ CONFIRM -->
<div class="confirm-overlay hidden" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirmIcon">&#9888;&#65039;</div>
    <div class="confirm-title" id="confirmTitle">Are you sure?</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <input class="confirm-input" id="confirmInput" style="display:none" placeholder="">
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="resolveConfirm(false)">Cancel</button>
      <button class="btn-danger" id="confirmOkBtn" onclick="resolveConfirm(true)">Confirm</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════ TOAST -->
<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════════════════════ SCRIPT -->

// ── Helpers ───────────────────────────────────────────────────
function esc(s){ return String(s == null ? "" : s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmt(n){ return Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(s){ if(!s) return "—"; var d=new Date(s); return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}); }
function fmtDT(s){ if(!s) return "—"; var d=new Date(s); return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}); }

function toast(msg, type){
  var el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast show " + (type||"");
  clearTimeout(el._t);
  el._t = setTimeout(function(){ el.className = "toast"; }, 3400);
}

function confirm2(title, msg, icon, dangerLabel, inputPlaceholder){
  return new Promise(function(resolve){
    confirmResolver = resolve;
    document.getElementById("confirmTitle").textContent = title;
    document.getElementById("confirmMsg").textContent = msg;
    document.getElementById("confirmIcon").textContent = icon||"⚠️";
    var okBtn = document.getElementById("confirmOkBtn");
    okBtn.className = (dangerLabel && dangerLabel !== "Confirm") ? "btn-danger" : "btn-save";
    okBtn.textContent = dangerLabel || "Confirm";
    var inp = document.getElementById("confirmInput");
    if(inputPlaceholder){
      inp.style.display = "block";
      inp.placeholder = inputPlaceholder;
      inp.value = "";
    } else {
      inp.style.display = "none";
      inp.value = "";
    }
    document.getElementById("confirmOverlay").classList.remove("hidden");
  });
}

function resolveConfirm(val){
  document.getElementById("confirmOverlay").classList.add("hidden");
  var inputVal = document.getElementById("confirmInput").value.trim();
  if(confirmResolver){
    confirmResolver(val ? (inputVal || true) : false);
    confirmResolver = null;
  }
}

// ── Modal ─────────────────────────────────────────────────────
function openModal(title, bodyHTML, footerHTML){
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = bodyHTML;
  document.getElementById("modalFooter").innerHTML = footerHTML || '<button class="btn-cancel" onclick="closeModal()">Close</button>';
  document.getElementById("modalOverlay").classList.remove("hidden");
}
function closeModal(){ document.getElementById("modalOverlay").classList.add("hidden"); }
document.getElementById("modalOverlay").addEventListener("click", function(e){ if(e.target===this) closeModal(); });

// ── Tabs ──────────────────────────────────────────────────────
document.getElementById("tabsRow").addEventListener("click", function(e){
  var btn = e.target.closest(".tab");
  if(!btn) return;
  var n = parseInt(btn.dataset.tab);
  showTab(n);
});

function showTab(n){
  currentTab = n;
  for(var i=1;i<=TOTAL_TABS;i++){
    var tab = document.querySelector('[data-tab="'+i+'"]');
    var pnl = document.getElementById("pnl"+i);
    if(tab) tab.classList.toggle("on", i===n);
    if(pnl) pnl.classList.toggle("on", i===n);
  }
  // Lazy render panels
  if(n===4) renderTopups();
  if(n===6) renderErrorLogs();
  if(n===7) renderAlertPanel();
}

// ── Auth ──────────────────────────────────────────────────────
document.getElementById("loginBtn").addEventListener("click", doLogin);
document.getElementById("aPass").addEventListener("keydown", function(e){ if(e.key==="Enter") doLogin(); });
document.getElementById("logoutBtn").addEventListener("click", doLogout);
document.getElementById("refreshBtn").addEventListener("click", refreshAll);

async function doLogin(){
  var email = document.getElementById("aEmail").value.trim();
  var pass  = document.getElementById("aPass").value;
  var errEl = document.getElementById("errMsg");
  errEl.style.display = "none";
  if(!email || !pass){
    errEl.style.display = "block";
    errEl.textContent = "Please enter your email and password.";
    return;
  }
  var btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.textContent = "Signing in...";
  try {
    var res = await sb.auth.signInWithPassword({ email: email, password: pass });
    if(res.error || !res.data || !res.data.user){
      errEl.style.display = "block";
      errEl.textContent = res.error ? res.error.message : "Invalid credentials.";
      btn.disabled = false;
      btn.textContent = "Sign In";
      return;
    }
    // Verify admin role in profiles table
    var uid = res.data.user.id;
    var pr = await sb.from("profiles").select("role").eq("id", uid).single();
    if(pr.error || !pr.data || pr.data.role !== "admin"){
      await sb.auth.signOut();
      errEl.style.display = "block";
      errEl.textContent = "Access denied. Insufficient permissions.";
      btn.disabled = false;
      btn.textContent = "Sign In";
      return;
    }
    showDash();
  } catch(ex){
    errEl.style.display = "block";
    errEl.textContent = "An error occurred. Please try again.";
    btn.disabled = false;
    btn.textContent = "Sign In";
  }
}

async function doLogout(){
  await sb.auth.signOut();
  location.reload();
}

// ── Dashboard init ────────────────────────────────────────────
async function showDash(){
  document.getElementById("loginWrap").style.display = "none";
  document.getElementById("dash").style.display = "block";
  await loadAllData();
}

async function refreshAll(){
  var btn = document.getElementById("refreshBtn");
  btn.textContent = "Loading...";
  btn.disabled = true;
  await loadAllData();
  btn.textContent = "↻ Refresh";
  btn.disabled = false;
}

async function loadAllData(){
  await Promise.all([
    loadListings(),
    loadUsers(),
    loadReports(),
    loadErrorLogs()
  ]);
  renderStats();
  renderAlerts();
  renderOverview();
  if(currentTab===2) renderListings();
  if(currentTab===3) renderUsers();
  if(currentTab===4) renderTopups();
  if(currentTab===5) renderReports();
  if(currentTab===6) renderErrorLogs();
}

async function loadListings(){
  try {
    var {data, error} = await sb.from("listings").select("*").order("created_at",{ascending:false});
    if(!error && data) DATA.listings = data;
  } catch(e){}
}

async function loadUsers(){
  try {
    var {data, error} = await sb.from("profiles").select("*").order("created_at",{ascending:false});
    if(!error && data) DATA.users = data;
  } catch(e){}
}

async function loadReports(){
  try {
    var {data, error} = await sb.from("reports").select("*").order("created_at",{ascending:false});
    if(error){
      DATA.reports = [];
      DATA.reportsExist = false;
    } else {
      DATA.reports = data || [];
      DATA.reportsExist = true;
    }
  } catch(e){
    DATA.reports = [];
    DATA.reportsExist = false;
  }
}

async function loadErrorLogs(){
  try {
    var {data, error} = await sb.from("error_logs").select("*").order("created_at",{ascending:false}).limit(200);
    if(!error && data) DATA.errorLogs = data;
  } catch(e){}
}

// ── Stats ─────────────────────────────────────────────────────
function renderStats(){
  var l = DATA.listings, u = DATA.users, r = DATA.reports;
  var totalUsers   = u.length;
  var activeList   = l.filter(function(x){ return x.status==="active"; }).length;
  var pendingList  = l.filter(function(x){ return x.status==="pending"; }).length;
  var openReports  = r.filter(function(x){ return x.status==="open"; }).length;
  var bannedUsers  = u.filter(function(x){ return x.status==="banned"; }).length;
  var totalWallet  = u.reduce(function(a,x){ return a + Number(x.wallet_usd||0); }, 0);

  document.getElementById("statsDiv").innerHTML =
    scard(totalUsers, "Total Users", "")+
    scard(activeList, "Active Listings", "")+
    scard(pendingList, "Pending Review", pendingList>0?"warn":"")+
    scard(openReports, "Open Reports", openReports>0?"warn":"")+
    scard(bannedUsers, "Banned Users", bannedUsers>0?"danger":"")+
    scard("$"+fmt(totalWallet), "Total Wallet Balance", "");
}

function scard(n, label, cls){
  return '<div class="stat-card"><div class="stat-n'+(cls?" "+cls:"")+'">'+(n)+'</div><div class="stat-l">'+esc(label)+'</div></div>';
}

// ── Alerts ────────────────────────────────────────────────────
function renderAlerts(){
  var l = DATA.listings, r = DATA.reports;
  var pending = l.filter(function(x){ return x.status==="pending"; }).length;
  var openR   = r.filter(function(x){ return x.status==="open"; }).length;
  var html = "";
  if(pending>0) html += '<div class="alert">&#128276; '+pending+' listing'+(pending>1?"s":"")+' waiting for review. <a href="#" onclick="showTab(2);document.getElementById(\'listFilter\').value=\'pending\';renderListings();return false;" style="color:#fbbf24;margin-left:6px;text-decoration:underline;">Review now</a></div>';
  if(openR>0)   html += '<div class="alert red">&#128681; '+openR+' open report'+(openR>1?"s":"")+' need attention. <a href="#" onclick="showTab(5);return false;" style="color:#f87171;margin-left:6px;text-decoration:underline;">View reports</a></div>';
  document.getElementById("alertsDiv").innerHTML = html;
}

// ── Listings Panel ────────────────────────────────────────────
function badgeClass(status, type){
  if(type==="listing"){
    var m = {active:"b-active",pending:"b-pending",rejected:"b-rejected",removed:"b-removed"};
    return m[status] || "b-removed";
  }
  if(type==="user"){
    var m2 = {active:"b-active",banned:"b-banned",suspended:"b-suspended"};
    return m2[status] || "b-active";
  }
  return "b-blue";
}

function renderListings(){
  var q = (document.getElementById("listSearch").value||"").toLowerCase();
  var f = document.getElementById("listFilter").value;
  var l = DATA.listings.filter(function(x){
    var match = !q || (x.title||"").toLowerCase().includes(q) || (x.seller_name||"").toLowerCase().includes(q) || (x.category||"").toLowerCase().includes(q) || (x.province||"").toLowerCase().includes(q);
    return match && (!f || x.status===f);
  });
  if(!l.length){
    document.getElementById("listContent").innerHTML = '<div class="empty"><div class="empty-icon">&#127968;</div>No listings found.</div>';
    return;
  }
  var rows = l.map(function(x){
    var bc = badgeClass(x.status,"listing");
    return "<tr>"+
      "<td><b>"+esc(x.title||"Untitled")+"</b></td>"+
      "<td>"+esc(x.seller_name||"—")+"<br><span style='font-size:11px;color:#475569'>"+esc(x.seller_phone||"")+"</span></td>"+
      "<td>"+esc(x.category||"—")+"</td>"+
      "<td>"+esc(x.province||"—")+"</td>"+
      "<td><b>"+(x.price?"$"+fmt(x.price):"—")+"</b></td>"+
      "<td>"+fmtDate(x.created_at)+"</td>"+
      "<td><span class='b "+bc+"'>"+esc(x.status||"—")+"</span></td>"+
      "<td><div class='actions'>"+
        "<button class='ab ab-view' onclick='viewListing(\""+x.id+"\")'>View</button>"+
        (x.status==="pending"
          ? "<button class='ab ab-approve' onclick='approveListing(\""+x.id+"\")'>Approve</button><button class='ab ab-reject' onclick='rejectListing(\""+x.id+"\")'>Reject</button>"
          : "")+
        (x.status==="active"
          ? "<button class='ab ab-remove' onclick='removeListing(\""+x.id+"\")'>Remove</button>"
          : "")+
        "<button class='ab ab-delete' onclick='deleteListing(\""+x.id+"\")'>Delete</button>"+
      "</div></td>"+
    "</tr>";
  }).join("");
  document.getElementById("listContent").innerHTML =
    "<div class='tbl-wrap'><table><thead><tr>"+
    "<th>Title</th><th>Seller</th><th>Category</th><th>Province</th><th>Price</th><th>Date</th><th>Status</th><th>Actions</th>"+
    "</tr></thead><tbody>"+rows+"</tbody></table></div>";
}

function viewListing(id){
  var x = DATA.listings.find(function(l){ return l.id===id; }); if(!x) return;
  var bc = badgeClass(x.status,"listing");
  var photos = [];
  try { photos = JSON.parse(x.photos||"[]"); if(!Array.isArray(photos)) photos=[]; } catch(e){}
  var body =
    row("Title", esc(x.title))+
    row("Description", '<span style="color:#94a3b8;white-space:pre-wrap">'+esc(x.description||"—")+"</span>")+
    row("Seller", esc(x.seller_name||"—"))+
    row("Seller Phone", esc(x.seller_phone||"—"))+
    row("Category", esc(x.category||"—"))+
    row("Province", esc(x.province||"—"))+
    row("City", esc(x.city||"—"))+
    row("Price", x.price ? "<b style='color:#3b82f6'>$"+fmt(x.price)+"</b>" : "—")+
    row("Currency", esc(x.currency||"USD"))+
    row("Status", "<span class='b "+bc+"'>"+esc(x.status)+"</span>")+
    row("Created", fmtDT(x.created_at))+
    row("Updated", fmtDT(x.updated_at))+
    row("ID", "<span style='font-size:10px;color:#475569'>"+esc(x.id)+"</span>");
  if(photos.length>0){
    body += '<div style="margin-top:12px"><div style="font-size:11px;color:#94a3b8;margin-bottom:6px;font-weight:700;text-transform:uppercase">Photos</div><div style="display:flex;gap:6px;flex-wrap:wrap">';
    photos.forEach(function(p){ body += '<img src="'+esc(p)+'" style="width:80px;height:60px;object-fit:cover;border-radius:6px;border:1px solid #334155">'; });
    body += "</div></div>";
  }
  var footer =
    '<button class="btn-cancel" onclick="closeModal()">Close</button>'+
    (x.status==="pending"
      ? '<button class="btn-save" onclick="closeModal();approveListing(\''+id+'\')">Approve</button>'+
        '<button class="btn-danger" onclick="closeModal();rejectListing(\''+id+'\')">Reject</button>'
      : "")+
    (x.status==="active"
      ? '<button class="btn-danger" onclick="closeModal();removeListing(\''+id+'\')">Remove</button>'
      : "");
  openModal("Listing Details", body, footer);
}

async function approveListing(id){
  var ok = await confirm2("Approve Listing","This listing will go live and be visible to all users.","✅","Approve");
  if(!ok) return;
  var {error} = await sb.from("listings").update({status:"active",updated_at:new Date().toISOString()}).eq("id",id);
  if(error){ toast("Error: "+error.message,"error"); return; }
  await loadListings(); renderListings(); renderStats(); renderOverview();
  toast("Listing approved and live!","success");
}

async function rejectListing(id){
  var reason = await confirm2("Reject Listing","This listing will be rejected. Optionally enter a reason:","❌","Reject","Reason (optional)");
  if(reason===false) return;
  var {error} = await sb.from("listings").update({status:"rejected",updated_at:new Date().toISOString()}).eq("id",id);
  if(error){ toast("Error: "+error.message,"error"); return; }
  await loadListings(); renderListings(); renderStats(); renderOverview();
  toast("Listing rejected.","");
}

async function removeListing(id){
  var ok = await confirm2("Remove Listing","This listing will be hidden from the marketplace but not permanently deleted.","&#128683;","Remove");
  if(!ok) return;
  var {error} = await sb.from("listings").update({status:"removed",updated_at:new Date().toISOString()}).eq("id",id);
  if(error){ toast("Error: "+error.message,"error"); return; }
  await loadListings(); renderListings(); renderStats(); renderOverview();
  toast("Listing removed from marketplace.","");
}

async function deleteListing(id){
  var x = DATA.listings.find(function(l){ return l.id===id; });
  var title = x ? x.title : "this listing";
  var ok = await confirm2("Permanently Delete","\""+esc(title)+"\" will be deleted forever. This cannot be undone.","&#128465;&#65039;","Delete");
  if(!ok) return;
  var {error} = await sb.from("listings").delete().eq("id",id);
  if(error){ toast("Error: "+error.message,"error"); return; }
  await loadListings(); renderListings(); renderStats(); renderOverview();
  toast("Listing permanently deleted.","");
}

// ── Users Panel ───────────────────────────────────────────────

  var q = (document.getElementById("userSearch").value||"").toLowerCase();
  var f = document.getElementById("userFilter").value;
  var u = DATA.users.filter(function(x){
    var match = !q || (x.name||"").toLowerCase().includes(q) || (x.phone||"").toLowerCase().includes(q);
    return match && (!f || x.status===f);
  });
  if(!u.length){
    document.getElementById("userContent").innerHTML = '<div class="empty"><div class="empty-icon">&#128100;</div>No users found.</div>';
    return;
  }
  var rows = u.map(function(x){
    var bc = badgeClass(x.status||"active","user");
    var roleBc = x.role==="admin"?"b-admin":x.role==="moderator"?"b-moderator":"b-blue";
    return "<tr>"+
      "<td><b>"+esc(x.name||"—")+"</b>"+(x.verified?"<span style='color:#22c55e;font-size:11px;margin-left:4px'>&#10003; verified</span>":"")+"</td>"+
      "<td>"+esc(x.phone||"—")+"</td>"+
      "<td><span class='b "+roleBc+"'>"+esc(x.role||"user")+"</span></td>"+
      "<td><b style='color:#3b82f6'>$"+fmt(x.wallet_usd)+"</b></td>"+
      "<td>"+fmtDate(x.created_at)+"</td>"+
      "<td><span class='b "+bc+"'>"+esc(x.status||"active")+"</span></td>"+
      "<td><div class='actions'>"+
        "<button class='ab ab-view' onclick='viewUser(\""+x.id+"\")'>View</button>"+
        "<button class='ab ab-edit' onclick='editUser(\""+x.id+"\")'>Edit</button>"+
        (!x.verified ? "<button class='ab ab-verify' onclick='verifyUser(\""+x.id+"\")'>Verify</button>" : "")+
        (x.status!=="banned"
          ? "<button class='ab ab-ban' onclick='banUser(\""+x.id+"\")'>Ban</button>"
          : "<button class='ab ab-unban' onclick='unbanUser(\""+x.id+"\")'>Unban</button>")+
      "</div></td>"+
    "</tr>";
  }).join("");
  document.getElementById("userContent").innerHTML =
    "<div class='tbl-wrap'><table><thead><tr>"+
    "<th>Name</th><th>Phone</th><th>Role</th><th>Wallet</th><th>Joined</th><th>Status</th><th>Actions</th>"+
    "</tr></thead><tbody>"+rows+"</tbody></table></div>";
}

function viewUser(id){
  var x = DATA.users.find(function(u){ return u.id===id; }); if(!x) return;
  var bc = badgeClass(x.status||"active","user");
  var roleBc = x.role==="admin"?"b-admin":x.role==="moderator"?"b-moderator":"b-blue";
  var userListings = DATA.listings.filter(function(l){ return l.seller_id===id; });
  var body =
    row("Name", esc(x.name||"—"))+
    row("Phone", esc(x.phone||"—"))+
    row("Role", "<span class='b "+roleBc+"'>"+esc(x.role||"user")+"</span>")+
    row("Wallet Balance", "<b style='color:#3b82f6'>$"+fmt(x.wallet_usd)+"</b>")+
    row("Verified", x.verified?"<span style='color:#22c55e'>&#10003; Yes</span>":"<span style='color:#94a3b8'>No</span>")+
    row("Status", "<span class='b "+bc+"'>"+esc(x.status||"active")+"</span>")+
    (x.ban_reason ? row("Ban Reason", esc(x.ban_reason)) : "")+
    row("Joined", fmtDT(x.created_at))+
    row("Updated", fmtDT(x.updated_at))+
    row("Listings", String(userListings.length)+" listing"+(userListings.length!==1?"s":""))+
    row("ID", "<span style='font-size:10px;color:#475569'>"+esc(x.id)+"</span>");
  var footer =
    '<button class="btn-cancel" onclick="closeModal()">Close</button>'+
    '<button class="btn-save" onclick="closeModal();editUser(\''+id+'\')">Edit</button>'+
    (x.status!=="banned"
      ? '<button class="btn-danger" onclick="closeModal();banUser(\''+id+'\')">Ban</button>'
      : '<button class="btn-save" onclick="closeModal();unbanUser(\''+id+'\')">Unban</button>');
  openModal("User Profile", body, footer);
}

function editUser(id){
  var x = DATA.users.find(function(u){ return u.id===id; }); if(!x) return;
  var body =

  var matches = DATA.users.filter(function(x){

  }).slice(0,5);

      '</div>'+

async function applyWalletAdjust(uid, name){
  var amtEl = document.getElementById("adjAmt_"+uid);
  var typeEl = document.getElementById("adjType_"+uid);
  if(!amtEl||!typeEl) return;
  var amt = parseFloat(amtEl.value);
  var type = typeEl.value;
  if(isNaN(amt)||amt<0){ toast("Enter a valid amount.","error"); return; }
  var user = DATA.users.find(function(u){ return u.id===uid; });
  if(!user){ toast("User not found.","error"); return; }
  var currentBal = Number(user.wallet_usd||0);
  var newBal;
  var desc;
  if(type==="add"){    newBal=currentBal+amt; desc="Add $"+fmt(amt)+" → new balance $"+fmt(newBal); }
  else if(type==="subtract"){ newBal=Math.max(0,currentBal-amt); desc="Subtract $"+fmt(amt)+" → new balance $"+fmt(newBal); }
  else {               newBal=amt;           desc="Set balance to $"+fmt(newBal); }

  var ok = await confirm2("Adjust Wallet","User: "+name+"\n"+desc,"&#128178;","Apply");
  if(!ok) return;
  var {error} = await sb.from("profiles").update({wallet_usd:newBal, updated_at:new Date().toISOString()}).eq("id",uid);
  if(error){ toast("Error: "+error.message,"error"); return; }
  await loadUsers(); renderTopups();
  toast("Wallet updated to $"+fmt(newBal)+".","success");
}

// ── Reports Panel ─────────────────────────────────────────────
function renderReports(){
  if(!DATA.reportsExist){
    document.getElementById("reportContent").innerHTML = '<div class="empty-msg"><div style="font-size:28px;margin-bottom:10px">&#128681;</div>No reports table yet. Reports will appear here once users start flagging content.</div>';
    return;
  }
  var q = (document.getElementById("reportSearch").value||"").toLowerCase();
  var f = document.getElementById("reportFilter").value;
  var r = DATA.reports.filter(function(x){
    var match = !q || (x.reason||"").toLowerCase().includes(q) || (x.target_type||"").toLowerCase().includes(q) || (x.target_id||"").toLowerCase().includes(q);
    return match && (!f || x.status===f);
  });
  if(!r.length){
    document.getElementById("reportContent").innerHTML = '<div class="empty"><div class="empty-icon">&#128681;</div>No reports found.</div>';
    return;
  }
  var rows = r.map(function(x){
    var bc = x.status==="open"?"b-open":"b-resolved";
    return "<tr>"+
      "<td><span class='b b-blue'>"+esc(x.target_type||"—")+"</span></td>"+
      "<td><span style='font-size:11px;color:#475569'>"+esc(x.target_id||"—")+"</span></td>"+
      "<td>"+esc(x.reason||"—")+"</td>"+
      "<td>"+fmtDate(x.created_at)+"</td>"+
      "<td><span class='b "+bc+"'>"+esc(x.status||"open")+"</span></td>"+
      "<td><div class='actions'>"+
        "<button class='ab ab-view' onclick='viewReport(\""+x.id+"\")'>View</button>"+
        (x.status==="open" ? "<button class='ab ab-resolve' onclick='resolveReport(\""+x.id+"\")'>Resolve</button>" : "")+
        "<button class='ab ab-delete' onclick='deleteReport(\""+x.id+"\")'>Delete</button>"+
      "</div></td>"+
    "</tr>";
  }).join("");

    "<div class='tbl-wrap'><table><thead><tr>"+
    "<th>Type</th><th>Target ID</th><th>Reason</th><th>Date</th><th>Status</th><th>Actions</th>"+
    "</tr></thead><tbody>"+rows+"</tbody></table></div>";
}

function viewReport(id){
  var x = DATA.reports.find(function(r){ return r.id===id; }); if(!x) return;
  var bc = x.status==="open"?"b-open":"b-resolved";
  var targetListing = x.target_type==="listing" ? DATA.listings.find(function(l){ return l.id===x.target_id; }) : null;
  var targetUser    = x.target_type==="user"    ? DATA.users.find(function(u){ return u.id===x.target_id; })    : null;
  var body =
    row("Type", "<span class='b b-blue'>"+esc(x.target_type||"—")+"</span>")+
    row("Target ID", "<span style='font-size:10px;color:#475569'>"+esc(x.target_id||"—")+"</span>")+
    (targetListing ? row("Target Listing", "<b>"+esc(targetListing.title)+"</b> ("+esc(targetListing.status)+")"): "")+
    (targetUser    ? row("Target User",    "<b>"+esc(targetUser.name||"—")+"</b> | "+esc(targetUser.phone||"—")): "")+
    row("Reason", esc(x.reason||"—"))+
    row("Reported By", "<span style='font-size:10px;color:#475569'>"+esc(x.reported_by||"—")+"</span>")+
    row("Status", "<span class='b "+bc+"'>"+esc(x.status||"open")+"</span>")+
    row("Reported On", fmtDT(x.created_at));

  var extraBtns = "";
  if(x.status==="open"){
    if(targetListing && targetListing.status==="active"){
      extraBtns += '<button class="btn-danger" onclick="closeModal();resolveReportAndRemoveListing(\''+id+'\',\''+x.target_id+'\')">Resolve + Remove Listing</button>';
    }
    if(targetUser && targetUser.status!=="banned"){
      extraBtns += '<button class="btn-danger" onclick="closeModal();resolveReportAndBanUser(\''+id+'\',\''+x.target_id+'\')">Resolve + Ban User</button>';
    }
  }
  var footer =
    '<button class="btn-cancel" onclick="closeModal()">Close</button>'+
    (x.status==="open" ? '<button class="btn-save" onclick="closeModal();resolveReport(\''+id+'\')">Resolve</button>' : "")+
    extraBtns;
  openModal("Report Details", body, footer);
}

async function resolveReport(id){
  var ok = await confirm2("Resolve Report","This report will be marked as resolved.","&#10003;","Resolve");
  if(!ok) return;
  var {error} = await sb.from("reports").update({status:"resolved"}).eq("id",id);
  if(error){ toast("Error: "+error.message,"error"); return; }
  await loadReports(); renderReports(); renderStats(); renderAlerts(); renderOverview();
  toast("Report resolved.","success");
}

async function resolveReportAndRemoveListing(reportId, listingId){
  var ok = await confirm2("Resolve + Remove Listing","The report will be resolved AND the listing will be removed from the marketplace.","&#128683;","Proceed");
  if(!ok) return;
  try {
    await sb.from("reports").update({status:"resolved"}).eq("id",reportId);
    await sb.from("listings").update({status:"removed", updated_at:new Date().toISOString()}).eq("id",listingId);
    await loadReports(); await loadListings();
    renderReports(); renderListings(); renderStats(); renderAlerts(); renderOverview();
    toast("Report resolved and listing removed.","success");
  } catch(e){ toast("Error: "+String(e),"error"); }
}

async function resolveReportAndBanUser(reportId, userId){
  var reason = await confirm2("Resolve + Ban User","The report will be resolved AND the user will be banned. Enter ban reason:","&#128683;","Ban User","Ban reason (required)");
  if(!reason || typeof reason !== "string" || reason.trim()===""){
    toast("A ban reason is required.","error"); return;
  }
  try {
    await sb.from("reports").update({status:"resolved"}).eq("id",reportId);
    await sb.from("profiles").update({status:"banned", ban_reason:reason.trim(), updated_at:new Date().toISOString()}).eq("id",userId);
    await loadReports(); await loadUsers();
    renderReports(); renderUsers(); renderStats(); renderAlerts(); renderOverview();
    toast("Report resolved and user banned.","success");
  } catch(e){ toast("Error: "+String(e),"error"); }
}

async function deleteReport(id){
  var ok = await confirm2("Delete Report","This report record will be permanently deleted.","&#128465;&#65039;","Delete");
  if(!ok) return;
  var {error} = await sb.from("reports").delete().eq("id",id);
  if(error){ toast("Error: "+error.message,"error"); return; }
  await loadReports(); renderReports(); renderStats(); renderAlerts();
  toast("Report deleted.","");
}

    '<div class="alert-form-row">'+
      '<div class="mfg">'+
        '<label class="mfl">Target Audience</label>'+
        '<select class="mfi-sel" id="alertTarget" onchange="updateAlertCount()">'+
          '<option value="all">All Users</option>'+
          '<option value="verified">Verified Users Only</option>'+
          '<option value="unverified">Unverified Users Only</option>'+
        '</select>'+
      '</div>'+
      '<div class="mfg">'+
        '<label class="mfl">Notification Title</label>'+
        '<input class="mfi" id="alertTitle" placeholder="e.g. New Feature Available" maxlength="80">'+
      '</div>'+
    '</div>'+

function updateAlertCount(){
  var target = (document.getElementById("alertTarget")||{}).value || "all";
  var users = DATA.users;
  var targeted;
  if(target==="verified")   targeted = users.filter(function(u){ return u.verified===true; });
  else if(target==="unverified") targeted = users.filter(function(u){ return !u.verified; });
  else                          targeted = users;
  var el = document.getElementById("alertTargetCount");
  if(el) el.innerHTML = 'Will notify <b>'+targeted.length+'</b> user'+(targeted.length!==1?"s":"")+'.';
}

async function sendAlert(){
  var target = document.getElementById("alertTarget").value;
  var title  = document.getElementById("alertTitle").value.trim();
  var body   = document.getElementById("alertBody").value.trim();
  if(!title){ toast("Please enter a notification title.","error"); return; }
  if(!body){  toast("Please enter a message body.","error"); return; }

  var users = DATA.users;
  var targeted;
  if(target==="verified")        targeted = users.filter(function(u){ return u.verified===true; });
  else if(target==="unverified") targeted = users.filter(function(u){ return !u.verified; });
  else                           targeted = users;

  if(targeted.length===0){ toast("No users match the selected target.","error"); return; }

  var ok = await confirm2(
    "Send Notification",
    "This will send \""+title+"\" to "+targeted.length+" user"+(targeted.length!==1?"s":"")+". Continue?",
    "&#128276;",
    "Send"
  );
  if(!ok) return;

  var btn = document.getElementById("alertSendBtn");
  if(btn){ btn.disabled=true; btn.textContent="Sending..."; }

  var now = new Date().toISOString();
  var rows = targeted.map(function(u){
    return { user_id:u.id, title:title, body:body, read:false, created_at:now };
  });

  // Insert in batches of 100
  var errors = [];
  for(var i=0; i<rows.length; i+=100){
    var batch = rows.slice(i, i+100);
    var res = await sb.from("notifications").insert(batch);
    if(res.error) errors.push(res.error.message);
  }

  if(btn){ btn.disabled=false; btn.textContent="Send Notification"; }

  if(errors.length>0){
    toast("Sent with errors: "+errors[0],"error");
  } else {
    toast("Notification sent to "+targeted.length+" user"+(targeted.length!==1?"s":" ")+".","success");
    document.getElementById("alertTitle").value = "";
    document.getElementById("alertBody").value = "";
    updateAlertCount();
  }
}

// ── Row helper ────────────────────────────────────────────────
function row(label, val){
  return '<div class="info-row"><span class="info-label">'+esc(label)+'</span><span class="info-val">'+val+'</span></div>';
}

// ── Session init ──────────────────────────────────────────────
(async function init(){
  try {
    var res = await sb.auth.getSession();
    if(res.data && res.data.session && res.data.session.user){
      var uid = res.data.session.user.id;
      var pr = await sb.from("profiles").select("role").eq("id", uid).single();
      if(!pr.error && pr.data && pr.data.role==="admin"){
        showDash();
        return;
      } else {
        // Role check failed — sign out silently
        await sb.auth.signOut();
      }
    }
  } catch(e){}
  // Show login if not authenticated or not admin
  document.getElementById("loginWrap").style.display = "flex";
})();
</script>
