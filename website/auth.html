<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1A3A8F;--blue-dark:#0f2460;--blue-mid:#2550C0;--blue-light:#EEF2FF;
  --gold:#F5A623;--gold-dark:#D4891A;
  --bg:#F5F7FA;--text:#1A1A2E;--sub:#667085;--border:#E4E8F0;
  --success:#10b981;--danger:#ef4444;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:20px;--r-pill:999px;
  --shadow-blue:0 4px 20px rgba(26,58,143,.3);
  --shadow-gold:0 4px 16px rgba(245,166,35,.35);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{font-family:var(--font);background:var(--blue-dark);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--font);border:none;background:none}
input,select,textarea{font-family:var(--font)}
.hidden{display:none!important}

/* PAGE BACKGROUND */
.auth-page{
  min-height:100vh;
  background:linear-gradient(160deg,#0f2460 0%,#1A3A8F 45%,#1e40af 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 16px 40px;
  position:relative;overflow:hidden;
}
.auth-page::before{
  content:'';position:absolute;top:-120px;right:-120px;width:500px;height:500px;
  border-radius:50%;background:radial-gradient(circle,rgba(245,166,35,.12) 0%,transparent 70%);
  pointer-events:none;
}
.auth-page::after{
  content:'';position:absolute;bottom:-80px;left:-80px;width:400px;height:400px;
  border-radius:50%;background:radial-gradient(circle,rgba(245,166,35,.08) 0%,transparent 70%);
  pointer-events:none;
}

/* BACK LINK */
.auth-back{
  position:absolute;top:20px;left:20px;display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:600;color:rgba(255,255,255,.6);transition:color .2s;z-index:10;
}
.auth-back:hover{color:#fff}
.auth-back svg{flex-shrink:0}

/* BRAND */
.auth-brand-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;position:relative;z-index:1}
.auth-brand{
  font-size:36px;font-weight:900;letter-spacing:-1px;color:#fff;
  display:inline-flex;align-items:center;gap:0;line-height:1;
}
.auth-brand em{color:var(--gold);font-style:normal}
.auth-tagline{font-size:14px;color:rgba(255,255,255,.6);margin-top:6px;font-weight:500;letter-spacing:.2px}

/* ILLUSTRATION (shown on landing screen only) */
.auth-illustration{display:flex;justify-content:center;margin-bottom:20px;position:relative;z-index:1}
.auth-illustration svg{filter:drop-shadow(0 8px 24px rgba(0,0,0,.3))}

/* CARD */
.auth-card-wrap{width:100%;max-width:400px;position:relative;z-index:1}
.auth-card{
  background:#fff;border-radius:24px;padding:32px 28px 28px;
  box-shadow:0 20px 60px rgba(0,0,0,.3),0 0 0 .5px rgba(255,255,255,.1);
  width:100%;
}
@media(max-width:440px){.auth-card{padding:24px 20px 20px;border-radius:20px}}

/* FORM ELEMENTS */
.fg{margin-bottom:16px}
.fg:last-of-type{margin-bottom:0}
.fl{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px;display:block}
.fi{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-md);
  font-size:15px;color:var(--text);background:#fff;outline:none;transition:border-color .2s,box-shadow .2s;
}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,58,143,.12)}
.fi::placeholder{color:var(--sub);opacity:.6}
.fi-wrap{position:relative}
.fi-wrap .fi{padding-right:44px}
.fi-toggle{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--sub);padding:4px;line-height:1;
  display:flex;align-items:center;transition:color .2s;
}
.fi-toggle:hover{color:var(--blue)}

/* PASS STRENGTH */
.pass-strength-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:6px}
.pass-strength-bar{height:100%;border-radius:2px;transition:all .3s;width:0}
.pass-strength-lbl{font-size:11px;margin-top:3px;text-align:right;height:14px;color:var(--sub)}

/* BUTTONS */
.auth-btn{
  width:100%;background:var(--blue);color:#fff;border:none;border-radius:var(--r-md);
  padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-top:12px;
  box-shadow:var(--shadow-blue);transition:all .2s;font-family:var(--font);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.auth-btn:hover{background:var(--blue-mid)}
.auth-btn:active{transform:scale(.98);opacity:.9}
.auth-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.auth-btn.secondary{
  background:var(--bg);color:var(--sub);box-shadow:none;
  border:1.5px solid var(--border);font-weight:700;
}
.auth-btn.secondary:hover{border-color:var(--blue);color:var(--blue);background:#fff}
.auth-btn.gold{background:var(--gold);color:#fff;box-shadow:var(--shadow-gold)}
.auth-btn.gold:hover{background:var(--gold-dark)}

/* SOCIAL AUTH BUTTONS */
.social-btn{
  width:100%;min-height:52px;border:1.5px solid var(--border);border-radius:var(--r-md);
  background:#fff;display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:15px;font-weight:700;color:var(--text);cursor:pointer;margin-bottom:10px;
  transition:all .2s;font-family:var(--font);padding:12px 16px;
}
.social-btn:hover{box-shadow:0 2px 12px rgba(0,0,0,.1);border-color:#ccc}
.social-btn:active{transform:scale(.98)}

/* DIVIDER */
.auth-divider{
  display:flex;align-items:center;gap:12px;margin:10px 0;
  color:var(--sub);font-size:13px;font-weight:500;
}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* SCREEN HEADER */
.screen-hd{text-align:center;margin-bottom:22px}
.screen-hd h2{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.3px;margin-bottom:4px}
.screen-hd p{font-size:14px;color:var(--sub);line-height:1.5}

/* LINKS */
.auth-link{color:var(--blue);font-weight:700;cursor:pointer;text-decoration:none}
.auth-link:hover{text-decoration:underline}
.auth-link.gold{color:var(--gold)}

/* FOOTER UNDER CARD */
.auth-foot{
  margin-top:24px;text-align:center;font-size:12px;color:rgba(255,255,255,.45);
  line-height:1.8;position:relative;z-index:1;
}
.auth-foot a{color:rgba(255,255,255,.55);font-weight:600;transition:color .2s}
.auth-foot a:hover{color:#fff}
.auth-foot .sep{margin:0 6px;opacity:.4}

/* REGISTER LINK ROW */
.auth-switch{text-align:center;margin-top:16px;font-size:14px;color:var(--sub)}

/* CONSENT CHECKBOX */
.consent-row{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--sub);margin-bottom:14px;cursor:pointer;line-height:1.5}
.consent-row input[type=checkbox]{margin-top:2px;width:15px;height:15px;flex-shrink:0;accent-color:var(--blue);cursor:pointer}

/* FORGOT PASS ROW */
.forgot-row{display:flex;justify-content:flex-end;margin-bottom:6px}

/* OTP INPUT */
.otp-input-wrap{display:flex;gap:8px;margin:14px 0}
.otp-digit{
  flex:1;text-align:center;font-size:26px;font-weight:800;
  padding:12px 0;border:1.5px solid var(--border);border-radius:var(--r-md);
  outline:none;color:var(--text);background:#fff;letter-spacing:0;
  transition:border-color .2s,box-shadow .2s;font-family:var(--font);
}
.otp-digit:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,58,143,.12)}

/* SUCCESS SCREEN */
.auth-success{text-align:center;padding:12px 8px}
.auth-success-icon{
  width:72px;height:72px;border-radius:50%;background:#dcfce7;
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px;
}

/* ERROR MESSAGE */
.auth-error{
  background:#fef2f2;border:1.5px solid #fecaca;border-radius:var(--r-sm);
  padding:10px 14px;font-size:13px;color:#dc2626;margin-bottom:14px;line-height:1.5;
}

/* SPINNER */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,.4);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;
}
.spinner.dark{border-color:rgba(26,58,143,.25);border-top-color:var(--blue)}

/* TOAST */
#toastC{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--text);color:#fff;padding:12px 20px;border-radius:var(--r-pill);font-size:14px;font-weight:500;opacity:0;transform:translateY(8px);transition:all .3s;max-width:320px;text-align:center}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--success)}.toast.error{background:var(--danger)}

/* SLIDE TRANSITIONS */
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:none}}
@keyframes slideBack{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:none}}
.slide-in{animation:slideIn .22s ease}
.slide-back{animation:slideBack .22s ease}
</style>

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

/* ---- TOAST ---- */
function toast(msg,type=''){
  const c=document.getElementById('toastC');
  const t=document.createElement('div');

  requestAnimationFrame(()=>requestAnimationFrame(()=>t.classList.add('show')));

/* ---- PASS STRENGTH ---- */
function passStrength(p){
  let s=0;
  if(p.length>=8)s++;if(p.length>=12)s++;
  if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;
  if(s<=1)return{label:'Weak',color:'#ef4444',w:'25%'};
  if(s<=2)return{label:'Fair',color:'#f97316',w:'50%'};
  if(s<=3)return{label:'Good',color:'#eab308',w:'75%'};
  return{label:'Strong',color:'#22c55e',w:'100%'};
}
function updatePassStrength(){
  const p=document.getElementById('newPass');
  const bar=document.getElementById('passStrengthBar');
  const lbl=document.getElementById('passStrengthLbl');
  if(!p||!bar||!lbl)return;
  if(!p.value){bar.style.width='0';lbl.textContent='';return}
  const s=passStrength(p.value);
  bar.style.width=s.w;bar.style.background=s.color;
  lbl.textContent=s.label;lbl.style.color=s.color;
}

/* ---- REDIRECT AFTER AUTH ---- */
function getReturnUrl(){
  const q=new URLSearchParams(location.search);
  const pm=sessionStorage.getItem('pm_return_url');
  const url=q.get('return')||pm||'index.html';
  // Never redirect back to auth.html
  if(url.includes('auth.html')||url.includes('auth-callback.html'))return'index.html';
  return url;
}

/* ---- SESSION ---- */
function saveSession(data){
  // data = { access_token, refresh_token, expires_in, user }
  const session={
    access_token:data.access_token,
    refresh_token:data.refresh_token,
    expires_at:Math.floor(Date.now()/1000)+(data.expires_in||3600),
    user:data.user
  };
  localStorage.setItem('pm_session',JSON.stringify(session));
}
function getSession(){
  try{
    const s=localStorage.getItem('pm_session');
    if(!s)return null;
    const session=JSON.parse(s);
    if(session.expires_at&&Date.now()/1000>session.expires_at+60){
      localStorage.removeItem('pm_session');return null;
    }
    return session;
  }catch{return null}
}

/* ---- CHECK IF ALREADY SIGNED IN ---- */
(function checkExisting(){
  const s=getSession();
  if(s&&s.access_token){
    // Already signed in — redirect
    const returnUrl=getReturnUrl();
    window.location.href=returnUrl;
  }
})();

/* ---- SUPABASE REST HELPERS ---- */
async function sbPost(path,body,token){
  const headers={'apikey':SB_KEY,'Content-Type':'application/json'};
  if(token)headers['Authorization']='Bearer '+token;
  const r=await fetch(SB_URL+path,{method:'POST',headers,body:JSON.stringify(body)});
  const json=await r.json().catch(()=>({}));
  return{ok:r.ok,status:r.status,data:json};
}

/* ---- ACTION: SIGN IN ---- */
async function doSignIn(){
  if(busy)return;
  const email=(document.getElementById('siEmail')?.value||'').trim();
  const pass=document.getElementById('siPass')?.value||'';
  showError('signInError','');
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)){showError('signInError','Please enter a valid email address.');return}
  if(!pass){showError('signInError','Please enter your password.');return}
  setBusy(true);
  const btn=document.getElementById('signInBtn');
  btn.innerHTML='<div class="spinner"></div> Signing in…';
  try{
    const res=await sbPost('/auth/v1/token?grant_type=password',{email,password:pass});
    if(!res.ok){
      let msg=res.data?.error_description||res.data?.msg||res.data?.error||'Sign in failed';
      if(msg.toLowerCase().includes('invalid login'))msg='Wrong email or password. Please try again.';
      if(msg.toLowerCase().includes('email not confirmed'))msg='Please verify your email first. Check your inbox.';
      showError('signInError',msg);
      btn.innerHTML='Sign In';
      setBusy(false);return;
    }
    saveSession(res.data);
    const name=res.data.user?.user_metadata?.full_name||res.data.user?.user_metadata?.name||res.data.user?.email||'';
    showSuccess(name.split(' ')[0],'signin');
  }catch(err){
    showError('signInError','Connection error. Please check your internet and try again.');
    btn.innerHTML='Sign In';
    setBusy(false);
  }
}

/* ---- ACTION: SIGN UP ---- */
async function doSignUp(){
  if(busy)return;
  const name=(document.getElementById('newName')?.value||'').trim();
  const email=(document.getElementById('newEmail')?.value||'').trim();
  const phone=(document.getElementById('newPhone')?.value||'').trim();
  const pass=document.getElementById('newPass')?.value||'';
  const pass2=document.getElementById('newPass2')?.value||'';
  const consent=document.getElementById('ageConsent')?.checked;
  showError('signUpError','');

  if(name.length<2){showError('signUpError','Please enter your full name.');focusId('newName');return}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)){showError('signUpError','Please enter a valid email address.');focusId('newEmail');return}
  if(phone&&!/^(\+263|0)[0-9]{9}$/.test(phone.replace(/\s/g,''))){showError('signUpError','Enter a valid Zimbabwe phone number (e.g. +263 77 123 4567 or 077 123 4567).');focusId('newPhone');return}
  if(pass.length<8){showError('signUpError','Password must be at least 8 characters.');focusId('newPass');return}
  if(!/[A-Z]/.test(pass)){showError('signUpError','Password must include at least one uppercase letter.');focusId('newPass');return}
  if(!/[0-9]/.test(pass)&&!/[^A-Za-z0-9]/.test(pass)){showError('signUpError','Password must include a number or special character.');focusId('newPass');return}
  if(pass!==pass2){showError('signUpError','Passwords do not match.');focusId('newPass2');return}
  if(!consent){showError('signUpError','Please confirm you are 18 or older and agree to our Terms and Privacy Policy.');return}

  setBusy(true);
  const btn=document.getElementById('signUpBtn');
  btn.innerHTML='<div class="spinner"></div> Creating account…';
  try{
    const res=await sbPost('/auth/v1/signup',{
      email,password:pass,
      data:{full_name:name},
      options:{data:{full_name:name}}
    });
    if(!res.ok){
      let msg=res.data?.error_description||res.data?.msg||res.data?.error||'Sign up failed';
      if(msg.toLowerCase().includes('already registered')||msg.toLowerCase().includes('already exists')||msg.toLowerCase().includes('unique constraint')){
        msg='This email is already registered. <span class="auth-link" onclick="showSignIn(\'in\')">Sign in instead</span>';
      }
      document.getElementById('signUpError').innerHTML=`<div class="auth-error">${msg}</div>`;
      btn.innerHTML='Create Account';
      setBusy(false);return;
    }
    // Save phone to profiles if provided (best-effort, non-blocking)
    if(phone&&res.data?.user?.id){
      sbPost('/rest/v1/profiles',{id:res.data.user.id,name,phone:phone||null},{}).catch(()=>{});
    }
    if(res.data?.session?.access_token){
      // Email auto-confirmed (no OTP needed)
      saveSession(res.data.session);
      showSuccess(name.split(' ')[0],'signup');
    } else {
      // Email confirmation required — show OTP
      showOtp(email);
    }
  }catch(err){
    showError('signUpError','Connection error. Please check your internet and try again.');
    btn.innerHTML='Create Account';
    setBusy(false);
  }
}

/* ---- ACTION: VERIFY OTP ---- */
async function doVerifyOtp(){
  if(busy)return;
  const otp=(document.getElementById('otpIn')?.value||'').trim().replace(/\s/g,'');
  showError('otpError','');
  if(otp.length!==6||!/^\d{6}$/.test(otp)){showError('otpError','Enter the 6-digit code from your email.');return}
  setBusy(true);
  const btn=document.getElementById('otpBtn');
  btn.innerHTML='<div class="spinner"></div> Verifying…';
  try{
    const res=await sbPost('/auth/v1/verify',{email:otpEmail,token:otp,type:'signup'});
    if(!res.ok){
      showError('otpError','Invalid or expired code. Try resending.');
      btn.innerHTML='Verify and Continue';
      setBusy(false);return;
    }
    if(res.data?.access_token){saveSession(res.data)}
    toast('Email verified! Welcome to PaMarket','success');
    showSuccess('','signup');
  }catch{
    showError('otpError','Connection error. Please try again.');
    btn.innerHTML='Verify and Continue';
    setBusy(false);
  }
}

/* ---- ACTION: RESEND OTP ---- */
let otpResendTimes=[];
async function doResendOtp(){
  const now=Date.now();
  otpResendTimes=otpResendTimes.filter(t=>now-t<10*60*1000);
  if(otpResendTimes.length>=3){toast('Too many resends. Please wait a few minutes.','error');return}
  otpResendTimes.push(now);
  try{
    const res=await sbPost('/auth/v1/resend',{type:'signup',email:otpEmail});
    toast(res.ok?'Code resent — check your inbox':'Could not resend. Try again.',res.ok?'success':'error');
  }catch{toast('Connection error','error')}
}

/* ---- ACTION: SAVE NEW PASSWORD ---- */
async function doResetPassword(){
  if(busy)return;
  const pass=document.getElementById('rpPass')?.value||'';
  const pass2=document.getElementById('rpPass2')?.value||'';
  const token=sessionStorage.getItem('pm_recovery_token')||'';
  showError('resetPwError','');
  if(!token){showError('resetPwError','Reset link expired. Please request a new one.');return}
  if(pass.length<8){showError('resetPwError','Password must be at least 8 characters.');return}
  if(!/[A-Z]/.test(pass)){showError('resetPwError','Password must include at least one uppercase letter.');return}
  if(!/[0-9]/.test(pass)&&!/[^A-Za-z0-9]/.test(pass)){showError('resetPwError','Password must include a number or special character.');return}
  if(pass!==pass2){showError('resetPwError','Passwords do not match.');return}
  setBusy(true);
  const btn=document.getElementById('resetPwBtn');
  btn.innerHTML='<div class="spinner"></div> Saving…';
  try{
    const r=await fetch(`${SB_URL}/auth/v1/user`,{
      method:'PUT',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({password:pass})
    });
    if(!r.ok){
      const err=await r.json().catch(()=>({}));
      let msg=err.error_description||err.msg||err.error||'Failed to update password';
      if(msg.includes('expired'))msg='Reset link has expired. Please request a new one.';
      showError('resetPwError',msg);
      btn.innerHTML='Save New Password';setBusy(false);return;
    }
    sessionStorage.removeItem('pm_recovery_token');
    toast('Password updated! Please sign in with your new password.','success');
    setTimeout(()=>showSignIn('in'),1200);
  }catch{
    showError('resetPwError','Connection error. Please try again.');
    btn.innerHTML='Save New Password';setBusy(false);
  }
}
