name: PaMarket QA Pipeline

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'QA run mode'
        required: false
        default: 'read-only'
        type: choice
        options:
          - read-only
          - full
      skip_deploy:
        description: 'Skip staging fix deployment'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  qa-pipeline:
    name: QA Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      qa_status:       ${{ steps.qa.outputs.qa_status }}
      has_critical:    ${{ steps.qa.outputs.has_critical }}
      has_regressions: ${{ steps.qa.outputs.has_regressions }}
      issue_count:     ${{ steps.qa.outputs.issue_count }}
      run_id:          ${{ steps.qa.outputs.run_id }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Restore cached issue store ─────────────────────────────────────────
      - name: Restore issue store cache
        uses: actions/cache@v4
        with:
          path: qa-system/reports/issue-store.json
          key: issue-store-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            issue-store-master-
            issue-store-

      # ── 3. Node.js setup ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 4. Install dependencies ──────────────────────────────────────────────
      - name: Install QA dependencies
        working-directory: qa-system
        run: npm install

      # ── 5. Install Playwright browser (optional — Agent 1 skips if missing) ──
      - name: Install Playwright (Chromium)
        working-directory: qa-system
        continue-on-error: true
        run: npx playwright install chromium --with-deps

      # ── 6. Run QA pipeline ───────────────────────────────────────────────────
      - name: Run QA pipeline
        id: qa
        working-directory: qa-system
        continue-on-error: true
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL != '' && secrets.SUPABASE_URL || 'https://gxgytumhknmnwspxjzxw.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_STAGING_URL:      ${{ secrets.SUPABASE_STAGING_URL }}
          SUPABASE_STAGING_ANON_KEY: ${{ secrets.SUPABASE_STAGING_ANON_KEY }}
          SUPABASE_STAGING_DB_URL:   ${{ secrets.SUPABASE_STAGING_DB_URL }}
          APP_URL:           ${{ secrets.APP_URL != '' && secrets.APP_URL || 'https://princechakusa.github.io/pamarket/www/' }}
          APP_STAGING_URL:   ${{ vars.APP_STAGING_URL }}
          QA_USER_EMAIL:     ${{ secrets.QA_USER_EMAIL }}
          QA_USER_PASSWORD:  ${{ secrets.QA_USER_PASSWORD }}
          QA_ADMIN_EMAIL:    ${{ secrets.QA_ADMIN_EMAIL }}
          QA_ADMIN_PASSWORD: ${{ secrets.QA_ADMIN_PASSWORD }}
          QA_READ_ONLY:      'true'
          QA_SKIP_DEPLOY:    ${{ github.event.inputs.skip_deploy || 'true' }}
          BROWSER_HEADLESS:  'true'
          PLAYWRIGHT_TIMEOUT: '30000'
          REPORT_DIR:        './reports'
          REPORT_FORMAT:     'both'
        run: node orchestrator.js

      # ── 7. Upload QA reports ─────────────────────────────────────────────────
      - name: Upload QA reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qa-reports-${{ github.run_number }}
          path: qa-system/reports/
          retention-days: 30

      # ── 8. Save updated issue store ──────────────────────────────────────────
      - name: Save issue store cache
        uses: actions/cache@v4
        if: always()
        with:
          path: qa-system/reports/issue-store.json
          key: issue-store-${{ github.ref_name }}-${{ github.run_id }}

      # ── 9. Fail on critical issues ───────────────────────────────────────────
      - name: Fail on critical issues
        if: steps.qa.outputs.has_critical == 'true'
        run: |
          echo "::error::QA blocked — critical issues found"
          exit 1

      # ── 10. Fail on regressions ──────────────────────────────────────────────
      - name: Fail on regressions
        if: steps.qa.outputs.has_regressions == 'true'
        run: |
          echo "::error::QA blocked — regressions detected"
          exit 1

      # ── 11. Pass notice ──────────────────────────────────────────────────────
      - name: QA passed
        if: steps.qa.outputs.qa_status == 'passing'
        run: echo "::notice::QA passed — no critical issues"
